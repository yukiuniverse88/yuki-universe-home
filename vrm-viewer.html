<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>VRM Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg1: #0b1020;
      --bg2: #131c38;
      --panel: rgba(10, 15, 30, 0.74);
      --panel-strong: rgba(10, 15, 30, 0.9);
      --line: rgba(255, 255, 255, 0.14);
      --text: #f7f9ff;
      --muted: #b8c2e2;
      --accent: #86a9ff;
      --ok: #90f2b6;
      --error: #ff9d9d;
      --shadow: 0 12px 32px rgba(0,0,0,0.28);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at top, var(--bg2) 0%, var(--bg1) 58%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .topbar {
      position: fixed;
      top: calc(12px + var(--safe-top));
      left: calc(12px + var(--safe-left));
      right: calc(12px + var(--safe-right));
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      pointer-events: none;
    }

    .chip,
    .menu,
    .guide,
    .status,
    .button,
    .mini {
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .chip {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .chip small {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }

    .menu {
      pointer-events: auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      max-width: min(70vw, 420px);
    }

    .button,
    .mini,
    .file-label {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
      text-decoration: none;
      white-space: nowrap;
    }

    .button,
    .file-label {
      min-height: 42px;
      padding: 10px 16px;
    }

    .mini {
      min-height: 38px;
      padding: 8px 14px;
      font-size: 13px;
    }

    .button:hover,
    .mini:hover,
    .file-label:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
    }

    .button:active,
    .mini:active,
    .file-label:active {
      transform: translateY(1px);
    }

    #fileInput {
      display: none;
    }

    .status {
      position: fixed;
      left: calc(12px + var(--safe-left));
      right: calc(12px + var(--safe-right));
      bottom: calc(12px + var(--safe-bottom));
      z-index: 10;
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel);
      font-size: 14px;
      line-height: 1.45;
      color: var(--text);
      min-height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status.ok { color: var(--ok); }
    .status.error { color: var(--error); }

    .guide {
      position: fixed;
      inset: auto calc(12px + var(--safe-right)) calc(74px + var(--safe-bottom)) auto;
      z-index: 20;
      width: min(380px, calc(100vw - 24px - var(--safe-left) - var(--safe-right)));
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      display: none;
    }

    .guide.visible {
      display: block;
    }

    .guide h2 {
      margin: 0 0 10px;
      font-size: 17px;
    }

    .guide p {
      margin: 0 0 8px;
      font-size: 14px;
      line-height: 1.55;
      color: var(--muted);
    }

    .guide .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .drop {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(7, 10, 20, 0.7);
      border: 3px dashed rgba(134, 169, 255, 0.45);
    }

    .drop.visible {
      display: grid;
    }

    .drop-card {
      width: min(420px, 100%);
      padding: 20px 18px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(11, 16, 32, 0.95);
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      box-shadow: var(--shadow);
    }

    @media (max-width: 720px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .menu {
        justify-content: flex-start;
        max-width: 100%;
      }

      .chip {
        width: fit-content;
        max-width: 100%;
      }

      .button,
      .file-label,
      .mini {
        font-size: 14px;
      }

      .guide {
        left: calc(12px + var(--safe-left));
        right: calc(12px + var(--safe-right));
        bottom: calc(74px + var(--safe-bottom));
        width: auto;
      }

      .status {
        font-size: 13px;
      }
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/",
      "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.5.1/lib/three-vrm.module.min.js"
    }
  }
  </script>
</head>
<body>
  <div class="topbar">
    <div class="chip">VRM Viewer <small id="modelName">自動読み込み待機中</small></div>

    <div class="menu">
      <button id="resetViewBtn" class="button" type="button">視点リセット</button>
      <label for="fileInput" class="file-label">別のVRMを開く</label>
      <button id="guideBtn" class="mini" type="button">案内</button>
    </div>
  </div>

  <input id="fileInput" type="file" accept=".vrm,model/vrm" />

  <div id="guide" class="guide">
    <h2>見えない時はここだけ試してね</h2>
    <p>このページは最初に <code>./KYOMA.vrm</code> を自動で開く設定にしてあるよ。</p>
    <p>1本指で回転、2本指でズームや移動。見失ったら <strong>視点リセット</strong> を押してね。</p>
    <p>別のモデルを見たい時は <strong>別のVRMを開く</strong> で .vrm を選べばOK。</p>
    <div class="actions">
      <button id="reloadDefaultBtn" class="mini" type="button">KYOMAを再読込</button>
      <button id="closeGuideBtn" class="mini" type="button">閉じる</button>
    </div>
  </div>

  <div id="status" class="status">準備中…</div>

  <div id="dropOverlay" class="drop">
    <div class="drop-card">ここに VRM ファイルをドロップ</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

    const DEFAULT_MODEL = './KYOMA.vrm';

    const statusEl = document.getElementById('status');
    const modelNameEl = document.getElementById('modelName');
    const fileInput = document.getElementById('fileInput');
    const resetViewBtn = document.getElementById('resetViewBtn');
    const guideBtn = document.getElementById('guideBtn');
    const guide = document.getElementById('guide');
    const closeGuideBtn = document.getElementById('closeGuideBtn');
    const reloadDefaultBtn = document.getElementById('reloadDefaultBtn');
    const dropOverlay = document.getElementById('dropOverlay');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1020);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0.0, 1.35, 3.2);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.2, 0);
    controls.enableDamping = true;
    controls.enablePan = true;
    controls.screenSpacePanning = true;
    controls.minDistance = 0.5;
    controls.maxDistance = 8;
    controls.update();

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x223355, 1.5);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, Math.PI * 0.85);
    dirLight.position.set(1.1, 1.8, 2.3);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, Math.PI * 0.28);
    fillLight.position.set(-1.4, 1.25, -1.5);
    scene.add(fillLight);

    const ambient = new THREE.AmbientLight(0xffffff, 0.45);
    scene.add(ambient);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(6, 64),
      new THREE.ShadowMaterial({ opacity: 0.18 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.001;
    floor.receiveShadow = true;
    scene.add(floor);

    const gridHelper = new THREE.GridHelper(8, 16, 0x4c6fff, 0x2d3f66);
    gridHelper.position.y = 0;
    gridHelper.material.opacity = 0.35;
    gridHelper.material.transparent = true;
    scene.add(gridHelper);

    const clock = new THREE.Clock();

    const loader = new GLTFLoader();
    loader.crossOrigin = 'anonymous';
    loader.register((parser) => new VRMLoaderPlugin(parser));

    let currentVrm = null;
    let currentRoot = null;
    let currentObjectUrl = null;
    let statusTimer = null;

    function setStatus(message, type = '', autoFade = false) {
      statusEl.textContent = message;
      statusEl.className = 'status' + (type ? ` ${type}` : '');

      if (statusTimer) {
        clearTimeout(statusTimer);
        statusTimer = null;
      }

      if (autoFade) {
        statusTimer = setTimeout(() => {
          if (statusEl.textContent === message) {
            statusEl.textContent = '表示中。見えない時は「視点リセット」を押してね。';
            statusEl.className = 'status';
          }
        }, 2600);
      }
    }

    function showGuide(force) {
      if (force === true) {
        guide.classList.add('visible');
      } else if (force === false) {
        guide.classList.remove('visible');
      } else {
        guide.classList.toggle('visible');
      }
    }

    function disposeCurrentModel() {
      if (currentRoot) {
        scene.remove(currentRoot);
        VRMUtils.deepDispose(currentRoot);
        currentRoot = null;
      }
      currentVrm = null;

      if (currentObjectUrl) {
        URL.revokeObjectURL(currentObjectUrl);
        currentObjectUrl = null;
      }
    }

    function fitCameraToObject(object3D) {
      const box = new THREE.Box3().setFromObject(object3D);
      if (box.isEmpty()) {
        camera.position.set(0.0, 1.35, 3.2);
        controls.target.set(0, 1.2, 0);
        controls.minDistance = 0.5;
        controls.maxDistance = 8;
        controls.update();
        return;
      }

      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const height = Math.max(size.y, 1.4);
      const width = Math.max(size.x, 0.5);
      const maxSize = Math.max(width, height, size.z);
      const fov = THREE.MathUtils.degToRad(camera.fov);
      const distance = ((maxSize * 0.58) / Math.tan(fov / 2)) * 1.2;

      const target = new THREE.Vector3(center.x, box.min.y + height * 0.52, center.z);
      controls.target.copy(target);
      camera.position.set(target.x, target.y + height * 0.06, target.z + distance);
      controls.minDistance = Math.max(distance * 0.35, 0.35);
      controls.maxDistance = Math.max(distance * 3.5, 4);
      camera.near = Math.max(distance / 100, 0.01);
      camera.far = Math.max(distance * 20, 100);
      camera.updateProjectionMatrix();
      controls.update();
    }

    function prepareVrm(vrm, sourceLabel) {
      const root = vrm.scene;

      VRMUtils.removeUnnecessaryVertices(root);
      VRMUtils.combineSkeletons(root);
      VRMUtils.combineMorphs(vrm);
      VRMUtils.rotateVRM0(vrm);

      root.traverse((obj) => {
        obj.frustumCulled = false;
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
        }
      });

      disposeCurrentModel();
      currentVrm = vrm;
      currentRoot = root;
      scene.add(root);
      fitCameraToObject(root);
      modelNameEl.textContent = sourceLabel.split('/').pop();
      setStatus(`読み込み完了: ${sourceLabel}`, 'ok', true);

      if (window.innerWidth <= 720) {
        showGuide(false);
      }
    }

    function handleLoadError(error) {
      console.error(error);
      modelNameEl.textContent = '読み込み失敗';
      setStatus(`読み込み失敗: ${error?.message ?? error}`, 'error');
      showGuide(true);
    }

    function loadVrmFromUrl(url) {
      if (!url) {
        setStatus('読み込むパスが空だったよ。', 'error');
        showGuide(true);
        return;
      }

      modelNameEl.textContent = '読み込み中…';
      setStatus(`読み込み中: ${url}`);
      loader.load(
        url,
        (gltf) => {
          const vrm = gltf.userData.vrm;
          if (!vrm) {
            setStatus('VRMとして認識できなかったよ。', 'error');
            showGuide(true);
            return;
          }
          prepareVrm(vrm, url);
        },
        (progress) => {
          const total = progress.total || 0;
          const percent = total > 0 ? ((progress.loaded / total) * 100).toFixed(1) : null;
          setStatus(percent ? `読み込み中: ${url} (${percent}%)` : `読み込み中: ${url}`);
        },
        handleLoadError
      );
    }

    function loadVrmFromFile(file) {
      if (!file) return;
      if (!file.name.toLowerCase().endsWith('.vrm')) {
        setStatus('`.vrm` ファイルを選んでね。', 'error');
        showGuide(true);
        return;
      }

      if (currentObjectUrl) {
        URL.revokeObjectURL(currentObjectUrl);
        currentObjectUrl = null;
      }

      currentObjectUrl = URL.createObjectURL(file);
      modelNameEl.textContent = file.name;
      setStatus(`読み込み中: ${file.name}`);

      loader.load(
        currentObjectUrl,
        (gltf) => {
          const vrm = gltf.userData.vrm;
          if (!vrm) {
            setStatus('VRMとして認識できなかったよ。', 'error');
            showGuide(true);
            return;
          }
          prepareVrm(vrm, file.name);
        },
        (progress) => {
          const total = progress.total || 0;
          const percent = total > 0 ? ((progress.loaded / total) * 100).toFixed(1) : null;
          setStatus(percent ? `読み込み中: ${file.name} (${percent}%)` : `読み込み中: ${file.name}`);
        },
        handleLoadError
      );
    }

    function resetView() {
      if (currentRoot) {
        fitCameraToObject(currentRoot);
        setStatus('視点を整えたよ。', 'ok', true);
      } else {
        camera.position.set(0.0, 1.35, 3.2);
        controls.target.set(0, 1.2, 0);
        camera.near = 0.1;
        camera.far = 100;
        camera.updateProjectionMatrix();
        controls.update();
        setStatus('視点を初期位置に戻したよ。', 'ok', true);
      }
    }

    resetViewBtn.addEventListener('click', resetView);
    guideBtn.addEventListener('click', () => showGuide());
    closeGuideBtn.addEventListener('click', () => showGuide(false));
    reloadDefaultBtn.addEventListener('click', () => loadVrmFromUrl(DEFAULT_MODEL));

    fileInput.addEventListener('change', (event) => {
      const file = event.target.files?.[0];
      if (file) loadVrmFromFile(file);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.addEventListener('dragenter', (event) => {
      event.preventDefault();
      dropOverlay.classList.add('visible');
    });

    window.addEventListener('dragover', (event) => {
      event.preventDefault();
      dropOverlay.classList.add('visible');
    });

    window.addEventListener('dragleave', (event) => {
      event.preventDefault();
      if (event.target === document.documentElement || event.target === document.body) {
        dropOverlay.classList.remove('visible');
      }
    });

    window.addEventListener('drop', (event) => {
      event.preventDefault();
      dropOverlay.classList.remove('visible');
      const file = event.dataTransfer?.files?.[0];
      if (file) loadVrmFromFile(file);
    });

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      if (currentVrm) currentVrm.update(delta);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    const params = new URLSearchParams(window.location.search);
    const initialModel = params.get('model') || DEFAULT_MODEL;

    setStatus('準備できたよ。自動で読み込むね。');
    if (window.innerWidth <= 720) {
      showGuide(false);
    } else {
      showGuide(true);
    }
    loadVrmFromUrl(initialModel);
  </script>
</body>
</html>
