<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>VRM Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg1: #0b1020;
      --bg2: #172447;
      --panel: rgba(11, 16, 32, 0.72);
      --panel-strong: rgba(11, 16, 32, 0.9);
      --line: rgba(255,255,255,0.14);
      --text: #f7f9ff;
      --muted: #b7c3e9;
      --accent: #91b1ff;
      --accent-2: #c9a9ff;
      --ok: #96f2b6;
      --error: #ff9e9e;
      --shadow: 0 16px 40px rgba(0,0,0,0.28);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 50% 14%, rgba(168, 194, 255, 0.16), transparent 26%),
        radial-gradient(circle at 80% 18%, rgba(201, 169, 255, 0.12), transparent 20%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 58%);
    }

    body {
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .topbar {
      position: fixed;
      top: calc(12px + var(--safe-top));
      left: calc(12px + var(--safe-left));
      right: calc(12px + var(--safe-right));
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      pointer-events: none;
    }

    .brand,
    .controls,
    .status,
    .advanced,
    .drop,
    .hint-badge {
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .brand {
      pointer-events: auto;
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel);
      min-width: 152px;
    }

    .brand-title {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.02em;
      margin-bottom: 2px;
    }

    .brand-sub {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .controls {
      pointer-events: auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      padding: 8px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: var(--panel);
      max-width: min(72vw, 560px);
    }

    .btn,
    .file-label,
    .mode {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font: inherit;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
      white-space: nowrap;
    }

    .btn,
    .file-label {
      min-height: 40px;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 13px;
    }

    .mode {
      min-height: 40px;
      padding: 10px 14px;
      font-weight: 800;
      font-size: 13px;
    }

    .btn:hover,
    .file-label:hover,
    .mode:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.22);
    }

    .btn:active,
    .file-label:active,
    .mode:active {
      transform: translateY(1px);
    }

    .mode.active {
      background: linear-gradient(180deg, rgba(145,177,255,0.32), rgba(145,177,255,0.18));
      border-color: rgba(145,177,255,0.5);
    }

    .btn.toggle-on {
      background: linear-gradient(180deg, rgba(201,169,255,0.3), rgba(201,169,255,0.16));
      border-color: rgba(201,169,255,0.46);
    }

    #fileInput {
      display: none;
    }

    .status {
      position: fixed;
      left: calc(12px + var(--safe-left));
      right: calc(12px + var(--safe-right));
      bottom: calc(12px + var(--safe-bottom));
      z-index: 18;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel);
      font-size: 14px;
      line-height: 1.45;
      min-height: 52px;
    }

    .status.ok { color: var(--ok); }
    .status.error { color: var(--error); }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.9;
      flex: 0 0 auto;
    }

    .advanced {
      position: fixed;
      left: calc(12px + var(--safe-left));
      right: calc(12px + var(--safe-right));
      bottom: calc(74px + var(--safe-bottom));
      z-index: 19;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      display: none;
      gap: 10px;
      max-width: min(720px, calc(100vw - 24px));
    }

    .advanced.visible {
      display: grid;
    }

    .advanced-title {
      font-size: 14px;
      font-weight: 800;
    }

    .advanced-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .advanced input[type="text"] {
      flex: 1 1 240px;
      min-width: 0;
      min-height: 42px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }

    .advanced-note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.55;
    }

    .hint-badge {
      position: fixed;
      right: calc(12px + var(--safe-right));
      bottom: calc(138px + var(--safe-bottom));
      z-index: 17;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(11,16,32,0.58);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      max-width: min(280px, calc(100vw - 24px));
      pointer-events: none;
    }

    .drop {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(7, 10, 20, 0.72);
      border: 3px dashed rgba(145,177,255,0.45);
    }

    .drop.visible {
      display: grid;
    }

    .drop-card {
      width: min(420px, 100%);
      padding: 20px 18px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(11, 16, 32, 0.94);
      text-align: center;
      font-size: 18px;
      font-weight: 800;
    }

    @media (max-width: 760px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: flex-start;
        max-width: 100%;
      }

      .hint-badge {
        display: none;
      }
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/",
      "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.5.1/lib/three-vrm.module.min.js"
    }
  }
  </script>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <div class="brand-title">VRM Viewer</div>
      <div class="brand-sub">その場で足踏み / ふわっと待機 / くるっと鑑賞</div>
    </div>

    <div class="controls">
      <button class="mode" type="button" data-mode="idle">ふわふわ</button>
      <button class="mode active" type="button" data-mode="walk">足踏み</button>
      <button class="mode" type="button" data-mode="pose">すっと立つ</button>
      <button id="turntableBtn" class="btn" type="button">くるっと回す</button>
      <button id="resetViewBtn" class="btn" type="button">視点リセット</button>
      <button id="toggleAdvancedBtn" class="btn" type="button">ファイル変更</button>
    </div>
  </div>

  <div id="advanced" class="advanced" aria-hidden="true">
    <div class="advanced-title">別ファイルを読む</div>
    <div class="advanced-row">
      <input id="urlInput" type="text" value="./KYOMA.vrm" spellcheck="false" />
      <button id="loadUrlBtn" class="btn" type="button">URL/パスから読む</button>
    </div>
    <div class="advanced-row">
      <label class="file-label" for="fileInput">VRMファイルを選ぶ</label>
      <input id="fileInput" type="file" accept=".vrm,model/vrm" />
      <button id="clearBtn" class="btn" type="button">モデルを外す</button>
      <button id="closeAdvancedBtn" class="btn" type="button">閉じる</button>
    </div>
    <div class="advanced-note">同じ場所に置いた <code>KYOMA.vrm</code> は自動で読むよ。別のVRMに変えたい時だけここを使ってね。</div>
  </div>

  <div id="hintBadge" class="hint-badge">操作: 1本指で回転 / 2本指で移動・ズーム</div>

  <div id="status" class="status">
    <span class="status-dot"></span>
    <span id="statusText">準備中…</span>
  </div>

  <div id="dropOverlay" class="drop">
    <div class="drop-card">ここに VRM ファイルをドロップ</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

    const statusEl = document.getElementById('status');
    const statusTextEl = document.getElementById('statusText');
    const advancedEl = document.getElementById('advanced');
    const hintBadgeEl = document.getElementById('hintBadge');
    const urlInput = document.getElementById('urlInput');
    const fileInput = document.getElementById('fileInput');
    const loadUrlBtn = document.getElementById('loadUrlBtn');
    const resetViewBtn = document.getElementById('resetViewBtn');
    const clearBtn = document.getElementById('clearBtn');
    const toggleAdvancedBtn = document.getElementById('toggleAdvancedBtn');
    const closeAdvancedBtn = document.getElementById('closeAdvancedBtn');
    const turntableBtn = document.getElementById('turntableBtn');
    const modeButtons = [...document.querySelectorAll('[data-mode]')];
    const dropOverlay = document.getElementById('dropOverlay');

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x0b1020, 7.5, 14.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = false;
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0.0, 1.38, 3.0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.2, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.screenSpacePanning = true;
    controls.minDistance = 0.8;
    controls.maxDistance = 7.5;
    controls.maxPolarAngle = Math.PI * 0.53;
    controls.update();

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x1b2748, 1.65);
    scene.add(hemiLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, Math.PI * 0.8);
    keyLight.position.set(1.8, 2.4, 2.8);
    scene.add(keyLight);

    const rimLight = new THREE.DirectionalLight(0xc8d7ff, Math.PI * 0.34);
    rimLight.position.set(-2.4, 1.6, -2.0);
    scene.add(rimLight);

    const fillLight = new THREE.PointLight(0xd6c4ff, 8, 10, 2);
    fillLight.position.set(0, 2.1, -1.6);
    scene.add(fillLight);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(2.6, 64),
      new THREE.MeshBasicMaterial({ color: 0x91b1ff, transparent: true, opacity: 0.06 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0.001;
    scene.add(floor);

    const ring = new THREE.Mesh(
      new THREE.RingGeometry(1.95, 2.08, 64),
      new THREE.MeshBasicMaterial({ color: 0xc3b0ff, transparent: true, opacity: 0.15, side: THREE.DoubleSide })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.002;
    scene.add(ring);

    const shadow = new THREE.Mesh(
      new THREE.CircleGeometry(0.75, 48),
      new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.18 })
    );
    shadow.rotation.x = -Math.PI / 2;
    shadow.position.y = 0.003;
    scene.add(shadow);

    const clock = new THREE.Clock();
    const loader = new GLTFLoader();
    loader.crossOrigin = 'anonymous';
    loader.register((parser) => new VRMLoaderPlugin(parser));

    const tempQuat = new THREE.Quaternion();
    const tempEuler = new THREE.Euler(0, 0, 0, 'XYZ');
    const box = new THREE.Box3();
    const sizeVec = new THREE.Vector3();
    const centerVec = new THREE.Vector3();

    let currentVrm = null;
    let currentRoot = null;
    let currentObjectUrl = null;
    let currentMode = 'walk';
    let turntableOn = false;
    let rootBaseQuat = null;
    let rootBasePos = null;
    let rootYOffset = 0;
    let autoLoaded = false;

    const rig = {
      bones: {},
      baseQuats: {},
      basePositions: {},
    };

    const rigBoneNames = [
      'hips',
      'spine',
      'chest',
      'upperChest',
      'neck',
      'head',
      'leftShoulder',
      'rightShoulder',
      'leftUpperArm',
      'rightUpperArm',
      'leftLowerArm',
      'rightLowerArm',
      'leftHand',
      'rightHand',
      'leftUpperLeg',
      'rightUpperLeg',
      'leftLowerLeg',
      'rightLowerLeg',
      'leftFoot',
      'rightFoot'
    ];

    function setStatus(message, type = '') {
      statusTextEl.textContent = message;
      statusEl.className = 'status' + (type ? ` ${type}` : '');
    }

    function setMode(mode) {
      currentMode = mode;
      modeButtons.forEach((button) => {
        button.classList.toggle('active', button.dataset.mode === mode);
      });
    }

    function setTurntable(value) {
      turntableOn = value;
      turntableBtn.classList.toggle('toggle-on', turntableOn);
      turntableBtn.textContent = turntableOn ? '回転中' : 'くるっと回す';
    }

    function resetRig() {
      rig.bones = {};
      rig.baseQuats = {};
      rig.basePositions = {};
      rootBaseQuat = null;
      rootBasePos = null;
      rootYOffset = 0;
    }

    function disposeCurrentModel() {
      if (currentRoot) {
        scene.remove(currentRoot);
        VRMUtils.deepDispose(currentRoot);
        currentRoot = null;
      }

      currentVrm = null;
      resetRig();

      if (currentObjectUrl) {
        URL.revokeObjectURL(currentObjectUrl);
        currentObjectUrl = null;
      }
    }

    function captureRig(vrm) {
      resetRig();
      const humanoid = vrm.humanoid;
      if (!humanoid?.getNormalizedBoneNode) return;

      for (const name of rigBoneNames) {
        const bone = humanoid.getNormalizedBoneNode(name);
        if (!bone) continue;
        rig.bones[name] = bone;
        rig.baseQuats[name] = bone.quaternion.clone();
        rig.basePositions[name] = bone.position.clone();
      }

      rootBaseQuat = vrm.scene.quaternion.clone();
      rootBasePos = vrm.scene.position.clone();

      const hips = rig.bones.hips;
      if (hips) {
        rootYOffset = -(hips.getWorldPosition(new THREE.Vector3()).y) + 0.01;
      } else {
        rootYOffset = 0;
      }
    }

    function setBoneRotation(name, x = 0, y = 0, z = 0) {
      const bone = rig.bones[name];
      const baseQuat = rig.baseQuats[name];
      if (!bone || !baseQuat) return;
      bone.quaternion.copy(baseQuat);
      tempEuler.set(x, y, z);
      tempQuat.setFromEuler(tempEuler);
      bone.quaternion.multiply(tempQuat);
    }

    function setBonePosition(name, x = 0, y = 0, z = 0) {
      const bone = rig.bones[name];
      const basePos = rig.basePositions[name];
      if (!bone || !basePos) return;
      bone.position.set(basePos.x + x, basePos.y + y, basePos.z + z);
    }

    function resetAllBones() {
      for (const name of Object.keys(rig.bones)) {
        const bone = rig.bones[name];
        const baseQuat = rig.baseQuats[name];
        const basePos = rig.basePositions[name];
        if (bone && baseQuat) bone.quaternion.copy(baseQuat);
        if (bone && basePos) bone.position.copy(basePos);
      }

      if (currentRoot && rootBaseQuat && rootBasePos) {
        currentRoot.quaternion.copy(rootBaseQuat);
        currentRoot.position.copy(rootBasePos);
        currentRoot.position.y += rootYOffset;
      }
    }

    function applyAnimation(elapsed) {
      if (!currentVrm || !currentRoot) return;
      resetAllBones();

      const s = Math.sin(elapsed * 4.0);
      const c = Math.cos(elapsed * 2.6);
      const sway = Math.sin(elapsed * 1.5);

      let bodyBob = 0;
      let rootRotate = 0;

      if (currentMode === 'idle') {
        bodyBob = Math.sin(elapsed * 2.2) * 0.015;
        rootRotate = Math.sin(elapsed * 0.8) * 0.08;

        setBoneRotation('hips', 0.02 * s, rootRotate * 0.35, 0.03 * sway);
        setBoneRotation('spine', 0.02 * c, rootRotate * 0.22, 0.02 * sway);
        setBoneRotation('chest', -0.01 * s, rootRotate * 0.3, -0.02 * sway);
        setBoneRotation('upperChest', -0.015 * s, rootRotate * 0.2, -0.04 * sway);
        setBoneRotation('neck', 0.02 * c, -rootRotate * 0.16, -0.03 * sway);
        setBoneRotation('head', -0.02 * c, -rootRotate * 0.2, -0.04 * sway);

        setBoneRotation('leftShoulder', 0.02, 0, -0.06);
        setBoneRotation('rightShoulder', 0.02, 0, 0.06);
        setBoneRotation('leftUpperArm', 0.14 + 0.03 * sway, 0.05, -0.12);
        setBoneRotation('rightUpperArm', 0.14 - 0.03 * sway, -0.05, 0.12);
        setBoneRotation('leftLowerArm', -0.16, 0, -0.02);
        setBoneRotation('rightLowerArm', -0.16, 0, 0.02);
        setBoneRotation('leftUpperLeg', -0.05, 0.01, 0.015);
        setBoneRotation('rightUpperLeg', 0.05, -0.01, -0.015);
        setBoneRotation('leftLowerLeg', 0.06, 0, 0);
        setBoneRotation('rightLowerLeg', 0.02, 0, 0);
      } else if (currentMode === 'pose') {
        bodyBob = Math.sin(elapsed * 2.0) * 0.008;
        rootRotate = 0.06;

        setBoneRotation('hips', -0.03, rootRotate * 0.32, 0.02);
        setBoneRotation('spine', 0.02, rootRotate * 0.2, -0.03);
        setBoneRotation('chest', 0.02, rootRotate * 0.15, -0.04);
        setBoneRotation('upperChest', 0.02, rootRotate * 0.15, -0.05);
        setBoneRotation('neck', 0.01, -0.05, -0.02);
        setBoneRotation('head', -0.03, -0.08, -0.04);

        setBoneRotation('leftShoulder', 0.04, 0.02, -0.1);
        setBoneRotation('rightShoulder', 0.04, -0.02, 0.1);
        setBoneRotation('leftUpperArm', 0.22, 0.14, -0.26);
        setBoneRotation('rightUpperArm', 0.12, -0.12, 0.18);
        setBoneRotation('leftLowerArm', -0.26, 0.08, -0.06);
        setBoneRotation('rightLowerArm', -0.18, -0.02, 0.02);
        setBoneRotation('leftHand', 0.02, 0, -0.08);
        setBoneRotation('rightHand', 0.02, 0, 0.06);
        setBoneRotation('leftUpperLeg', -0.12, 0.03, 0.1);
        setBoneRotation('rightUpperLeg', 0.08, -0.04, -0.04);
        setBoneRotation('leftLowerLeg', 0.12, 0, 0.02);
        setBoneRotation('rightLowerLeg', 0.03, 0, 0);
        setBoneRotation('leftFoot', 0.04, 0, 0);
        setBoneRotation('rightFoot', -0.02, 0, 0);
      } else {
        const step = Math.sin(elapsed * 5.1);
        const step2 = Math.sin(elapsed * 10.2);
        const liftL = Math.max(0, Math.sin(elapsed * 5.1));
        const liftR = Math.max(0, Math.sin(elapsed * 5.1 + Math.PI));
        bodyBob = Math.abs(step2) * 0.02;
        rootRotate = Math.sin(elapsed * 2.55) * 0.05;

        setBoneRotation('hips', 0.04 * step2, rootRotate * 0.25, 0.03 * step);
        setBoneRotation('spine', -0.03 * step2, -rootRotate * 0.12, -0.02 * step);
        setBoneRotation('chest', -0.02 * step2, -rootRotate * 0.18, -0.03 * step);
        setBoneRotation('upperChest', -0.015 * step2, -rootRotate * 0.2, -0.03 * step);
        setBoneRotation('neck', 0.02 * step2, 0.02 * step, 0.01 * step);
        setBoneRotation('head', -0.015 * step2, 0.03 * step, 0.01 * step);

        setBoneRotation('leftShoulder', 0.02, 0, -0.04);
        setBoneRotation('rightShoulder', 0.02, 0, 0.04);
        setBoneRotation('leftUpperArm', -0.55 * step, 0.05, -0.08);
        setBoneRotation('rightUpperArm', 0.55 * step, -0.05, 0.08);
        setBoneRotation('leftLowerArm', -0.15 + 0.12 * liftL, 0, -0.02);
        setBoneRotation('rightLowerArm', -0.15 + 0.12 * liftR, 0, 0.02);
        setBoneRotation('leftHand', 0.06 * step, 0, -0.02);
        setBoneRotation('rightHand', -0.06 * step, 0, 0.02);

        setBoneRotation('leftUpperLeg', 0.78 * step, 0.02, 0.04);
        setBoneRotation('rightUpperLeg', -0.78 * step, -0.02, -0.04);
        setBoneRotation('leftLowerLeg', 0.22 * liftL, 0, 0);
        setBoneRotation('rightLowerLeg', 0.22 * liftR, 0, 0);
        setBoneRotation('leftFoot', -0.12 * liftL, 0, 0);
        setBoneRotation('rightFoot', -0.12 * liftR, 0, 0);
      }

      if (currentRoot && rootBaseQuat && rootBasePos) {
        currentRoot.position.y = rootBasePos.y + rootYOffset + bodyBob;
        currentRoot.quaternion.copy(rootBaseQuat);
        tempEuler.set(0, turntableOn ? elapsed * 0.35 : rootRotate, 0);
        tempQuat.setFromEuler(tempEuler);
        currentRoot.quaternion.multiply(tempQuat);
      }

      shadow.scale.setScalar(1 + bodyBob * 10);
      ring.rotation.z += 0.0022;
    }

    function fitCameraToObject(object3D) {
      box.setFromObject(object3D);
      if (box.isEmpty()) {
        camera.position.set(0.0, 1.38, 3.0);
        controls.target.set(0, 1.2, 0);
        controls.update();
        return;
      }

      box.getSize(sizeVec);
      box.getCenter(centerVec);
      const maxSize = Math.max(sizeVec.x, sizeVec.y, sizeVec.z);
      const fov = THREE.MathUtils.degToRad(camera.fov);
      const distance = ((maxSize / 2) / Math.tan(fov / 2)) * 1.2;

      controls.target.set(centerVec.x, centerVec.y + sizeVec.y * 0.06, centerVec.z);
      camera.position.set(
        centerVec.x,
        centerVec.y + Math.max(sizeVec.y * 0.08, 0.1),
        centerVec.z + distance + Math.max(sizeVec.x * 0.1, 0.05)
      );

      camera.near = Math.max(distance / 100, 0.01);
      camera.far = Math.max(distance * 20, 100);
      camera.updateProjectionMatrix();
      controls.update();
    }

    function prepareVrm(vrm, sourceLabel) {
      const root = vrm.scene;

      VRMUtils.removeUnnecessaryVertices(root);
      VRMUtils.combineSkeletons(root);
      VRMUtils.combineMorphs(vrm);
      VRMUtils.rotateVRM0(vrm);

      root.traverse((obj) => {
        obj.frustumCulled = false;
      });

      disposeCurrentModel();
      currentVrm = vrm;
      currentRoot = root;
      scene.add(root);
      captureRig(vrm);
      fitCameraToObject(root);
      advancedEl.classList.remove('visible');
      advancedEl.setAttribute('aria-hidden', 'true');
      setStatus(`読み込み完了: ${sourceLabel}`, 'ok');
      autoLoaded = true;
    }

    function handleLoadError(error) {
      console.error(error);
      setStatus(`読み込み失敗: ${error?.message ?? error}`, 'error');
    }

    function loadVrmFromUrl(url) {
      if (!url) {
        setStatus('URLかパスを入れてね。', 'error');
        return;
      }

      setStatus(`読み込み中: ${url}`);
      loader.load(
        url,
        (gltf) => {
          const vrm = gltf.userData.vrm;
          if (!vrm) {
            setStatus('VRMとして認識できなかったよ。ファイル形式を確認してね。', 'error');
            return;
          }
          prepareVrm(vrm, url);
        },
        (progress) => {
          const total = progress.total || 0;
          const percent = total > 0 ? ((progress.loaded / total) * 100).toFixed(1) : null;
          setStatus(percent ? `読み込み中: ${url} (${percent}%)` : `読み込み中: ${url}`);
        },
        handleLoadError
      );
    }

    function loadVrmFromFile(file) {
      if (!file) return;
      if (!file.name.toLowerCase().endsWith('.vrm')) {
        setStatus('`.vrm` ファイルを選んでね。', 'error');
        return;
      }

      if (currentObjectUrl) {
        URL.revokeObjectURL(currentObjectUrl);
        currentObjectUrl = null;
      }

      currentObjectUrl = URL.createObjectURL(file);
      setStatus(`読み込み中: ${file.name}`);

      loader.load(
        currentObjectUrl,
        (gltf) => {
          const vrm = gltf.userData.vrm;
          if (!vrm) {
            setStatus('VRMとして認識できなかったよ。ファイル形式を確認してね。', 'error');
            return;
          }
          prepareVrm(vrm, file.name);
        },
        (progress) => {
          const total = progress.total || 0;
          const percent = total > 0 ? ((progress.loaded / total) * 100).toFixed(1) : null;
          setStatus(percent ? `読み込み中: ${file.name} (${percent}%)` : `読み込み中: ${file.name}`);
        },
        handleLoadError
      );
    }

    function resetView() {
      if (currentRoot) {
        fitCameraToObject(currentRoot);
        setStatus('視点をリセットしたよ。', 'ok');
      } else {
        camera.position.set(0.0, 1.38, 3.0);
        controls.target.set(0, 1.2, 0);
        camera.near = 0.1;
        camera.far = 100;
        camera.updateProjectionMatrix();
        controls.update();
        setStatus('視点を初期位置に戻したよ。', 'ok');
      }
    }

    function toggleAdvanced(force) {
      const visible = typeof force === 'boolean' ? force : !advancedEl.classList.contains('visible');
      advancedEl.classList.toggle('visible', visible);
      advancedEl.setAttribute('aria-hidden', visible ? 'false' : 'true');
    }

    loadUrlBtn.addEventListener('click', () => loadVrmFromUrl(urlInput.value.trim()));
    resetViewBtn.addEventListener('click', resetView);
    clearBtn.addEventListener('click', () => {
      disposeCurrentModel();
      fileInput.value = '';
      setStatus('モデルを外したよ。', '');
    });
    toggleAdvancedBtn.addEventListener('click', () => toggleAdvanced());
    closeAdvancedBtn.addEventListener('click', () => toggleAdvanced(false));
    turntableBtn.addEventListener('click', () => setTurntable(!turntableOn));

    fileInput.addEventListener('change', (event) => {
      const file = event.target.files?.[0];
      if (file) loadVrmFromFile(file);
    });

    urlInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') loadVrmFromUrl(urlInput.value.trim());
    });

    modeButtons.forEach((button) => {
      button.addEventListener('click', () => setMode(button.dataset.mode));
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.addEventListener('dragenter', (event) => {
      event.preventDefault();
      dropOverlay.classList.add('visible');
    });

    window.addEventListener('dragover', (event) => {
      event.preventDefault();
      dropOverlay.classList.add('visible');
    });

    window.addEventListener('dragleave', (event) => {
      event.preventDefault();
      if (event.target === document.documentElement || event.target === document.body) {
        dropOverlay.classList.remove('visible');
      }
    });

    window.addEventListener('drop', (event) => {
      event.preventDefault();
      dropOverlay.classList.remove('visible');
      const file = event.dataTransfer?.files?.[0];
      if (file) loadVrmFromFile(file);
    });

    let hintTimer = window.setTimeout(() => {
      hintBadgeEl.style.opacity = '0';
      hintBadgeEl.style.transition = 'opacity 400ms ease';
      window.setTimeout(() => { hintBadgeEl.style.display = 'none'; }, 450);
    }, 5200);

    renderer.domElement.addEventListener('pointerdown', () => {
      if (hintTimer) {
        clearTimeout(hintTimer);
        hintTimer = null;
      }
      hintBadgeEl.style.opacity = '0';
      hintBadgeEl.style.transition = 'opacity 200ms ease';
      window.setTimeout(() => { hintBadgeEl.style.display = 'none'; }, 220);
    }, { once: true });

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      const elapsed = clock.getElapsedTime();

      applyAnimation(elapsed);
      if (currentVrm) currentVrm.update(delta);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    const params = new URLSearchParams(window.location.search);
    const initialModel = params.get('model') || './KYOMA.vrm';
    urlInput.value = initialModel;
    loadVrmFromUrl(initialModel);

    window.addEventListener('error', (event) => {
      if (!autoLoaded) {
        setStatus(`エラー: ${event.message}`, 'error');
      }
    });
  </script>
</body>
</html>
