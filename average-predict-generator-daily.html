<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>平均予測ジェネレーター</title>
  <style>
    :root {
      --bg: #050507;
      --text: #f6f3f0;
      --muted: rgba(255, 255, 255, 0.66);
      --muted-2: rgba(255, 255, 255, 0.42);
      --line: rgba(255, 255, 255, 0.09);
      --card: rgba(14, 14, 20, 0.96);
      --good: #9ee6a8;
      --danger: #ff98ae;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      --safe-bottom: max(28px, env(safe-area-inset-bottom));
    }

    * { box-sizing: border-box; }

    html { background: var(--bg); }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", sans-serif;
      -webkit-text-size-adjust: 100%;
      background:
        radial-gradient(circle at 78% 18%, rgba(95, 86, 255, 0.22), transparent 26%),
        radial-gradient(circle at 50% 0%, rgba(255, 74, 74, 0.11), transparent 34%),
        radial-gradient(circle at 18% 88%, rgba(45, 88, 255, 0.09), transparent 26%),
        linear-gradient(180deg, #020204 0%, #07070a 52%, #040406 100%);
    }

    .wrap {
      width: min(100%, 860px);
      margin: 0 auto;
      padding: calc(22px + env(safe-area-inset-top)) 14px calc(120px + var(--safe-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      margin-bottom: 18px;
    }

    .back-chip {
      display: grid;
      place-items: center;
      width: 52px;
      height: 52px;
      border-radius: 20px;
      border: 1px solid var(--line);
      color: var(--text);
      text-decoration: none;
      background: linear-gradient(180deg, rgba(16, 16, 24, 0.95), rgba(8, 8, 12, 0.98));
      box-shadow: var(--shadow);
      font-size: 34px;
      line-height: 1;
    }

    .page-title {
      margin: 0;
      font-size: clamp(30px, 7vw, 56px);
      line-height: 1.04;
      font-weight: 850;
      letter-spacing: -0.04em;
    }

    .page-sub {
      margin: 12px 0 0;
      font-size: 14px;
      line-height: 1.75;
      color: var(--muted);
    }

    .card {
      position: relative;
      margin-top: 26px;
      padding: 24px 18px 18px;
      border-radius: 30px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
      background:
        radial-gradient(circle at 82% 20%, rgba(124, 89, 255, 0.14), transparent 24%),
        linear-gradient(180deg, rgba(22, 22, 30, 0.95), rgba(8, 8, 12, 0.97));
    }

    .section-label {
      margin: 0 0 12px;
      color: var(--muted-2);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: clamp(26px, 6vw, 42px);
      line-height: 1.12;
      font-weight: 850;
      letter-spacing: -0.04em;
    }

    .field-label {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 190px;
      resize: vertical;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(18, 18, 25, 0.98), rgba(9, 9, 13, 1));
      color: var(--text);
      padding: 18px 20px;
      font-size: 17px;
      line-height: 1.65;
      font-weight: 700;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    textarea::placeholder {
      color: rgba(255, 255, 255, 0.28);
      font-weight: 600;
    }

    textarea:focus {
      border-color: rgba(142, 166, 255, 0.7);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03), 0 0 0 4px rgba(142, 166, 255, 0.16);
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .btn {
      appearance: none;
      width: 100%;
      min-height: 72px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(14, 14, 20, 0.98), rgba(6, 6, 10, 1));
      color: var(--text);
      font-size: clamp(18px, 4.7vw, 22px);
      font-weight: 850;
      cursor: pointer;
      padding: 0 20px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .btn-main {
      background: linear-gradient(180deg, rgba(28, 29, 46, 0.98), rgba(11, 12, 20, 1));
      border-color: rgba(142, 166, 255, 0.28);
    }

    .status-note {
      margin-top: 16px;
      border-radius: 22px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(18, 18, 25, 0.96), rgba(8, 8, 12, 0.98));
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .status-note.good {
      color: var(--good);
      border-color: rgba(158, 230, 168, 0.26);
    }

    .status-note.bad {
      color: var(--danger);
      border-color: rgba(255, 152, 174, 0.24);
    }

    @media (max-width: 700px) {
      .wrap {
        padding-left: 12px;
        padding-right: 12px;
      }

      .card {
        padding: 20px 16px 16px;
        border-radius: 28px;
      }

      textarea {
        min-height: 168px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back-chip" href="health.html" aria-label="Healthへ戻る">‹</a>
    </div>

    <header>
      <h1 class="page-title">平均予測<br>ジェネレーター</h1>
      <p class="page-sub">今月ぶんをまとめて貼って、その時点の平均だけをさっと見られる版。</p>
    </header>

    <section class="card">
      <p class="section-label">Import</p>
      <h2 class="section-title">今月ぶんをまとめて入れる</h2>
      <p class="field-label">1行ずつ貼ってね</p>
      <textarea id="bulkInput" placeholder="例：
3/1 1577
3/2 1614
3/3 1568"></textarea>

      <div class="actions">
        <button class="btn btn-main" id="importBaseBtn" type="button">今の状態に反映</button>
        <button class="btn" id="clearBulkBtn" type="button">貼り付け欄を空にする</button>
      </div>

      <div id="bulkStatus" class="status-note">3/1 1577 みたいに貼れば、件数と平均を自動で出すよ。</div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = 'daily-average-generator-simple-v1';

    const bulkInputEl = document.getElementById('bulkInput');
    const importBaseBtn = document.getElementById('importBaseBtn');
    const clearBulkBtn = document.getElementById('clearBulkBtn');
    const bulkStatusEl = document.getElementById('bulkStatus');

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        bulkInput: bulkInputEl.value,
        statusClass: bulkStatusEl.className,
        statusText: bulkStatusEl.textContent,
      }));
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const state = JSON.parse(raw);
        if (typeof state.bulkInput === 'string') bulkInputEl.value = state.bulkInput;
        if (typeof state.statusClass === 'string') bulkStatusEl.className = state.statusClass;
        if (typeof state.statusText === 'string') bulkStatusEl.textContent = state.statusText;
      } catch (error) {
        console.error(error);
      }
    }

    function parseBulkText(text) {
      const lines = text.split(/\r?\n/).map(line => line.trim()).filter(Boolean);
      const rows = [];
      const errors = [];
      const months = [];

      lines.forEach((line, index) => {
        const match = line.match(/^(?:(\d{1,2})\s*\/\s*)?(\d{1,2})[\s\t　,、:：-]+(\d+(?:\.\d+)?)$/);
        if (!match) {
          errors.push(`${index + 1}行目`);
          return;
        }

        const [, month, day, calories] = match;
        if (month) months.push(Number(month));
        rows.push({
          month: month ? Number(month) : null,
          day: Number(day),
          calories: Number(calories),
        });
      });

      return { rows, errors, months };
    }

    function importBulk() {
      const raw = bulkInputEl.value.trim();
      if (!raw) {
        bulkStatusEl.className = 'status-note bad';
        bulkStatusEl.textContent = 'まずはカロリー記録を貼ってね。';
        saveState();
        return;
      }

      const { rows, errors, months } = parseBulkText(raw);

      if (errors.length) {
        bulkStatusEl.className = 'status-note bad';
        bulkStatusEl.textContent = `${errors.join('、')} の書き方が読めなかったよ。例：3/1 1577`;
        saveState();
        return;
      }

      if (!rows.length) {
        bulkStatusEl.className = 'status-note bad';
        bulkStatusEl.textContent = '読み込めるデータが見つからなかったよ。';
        saveState();
        return;
      }

      rows.sort((a, b) => a.day - b.day);

      const seenDays = new Set();
      for (const row of rows) {
        if (seenDays.has(row.day)) {
          bulkStatusEl.className = 'status-note bad';
          bulkStatusEl.textContent = `${row.day}日が重複してるよ。`;
          saveState();
          return;
        }
        seenDays.add(row.day);
      }

      const uniqueMonths = [...new Set(months)].filter(Boolean);
      const monthLabel = uniqueMonths.length === 1 ? `${uniqueMonths[0]}` : 'この';
      const maxDay = rows[rows.length - 1].day;
      const isContiguous = rows.every((row, index) => row.day === index + 1);
      const divisor = isContiguous ? maxDay : rows.length;
      const total = rows.reduce((sum, row) => sum + row.calories, 0);
      const average = total / divisor;

      bulkStatusEl.className = 'status-note good';
      bulkStatusEl.textContent = `${rows.length}件読み込んだよ。${monthLabel}/${maxDay} 時点の平均は ${average.toFixed(1)}kcal。`;
      if (!isContiguous) {
        bulkStatusEl.textContent += ' 日付が飛んでいたから、件数ベースで平均を出してるよ。';
      }
      saveState();
    }

    importBaseBtn.addEventListener('click', importBulk);
    clearBulkBtn.addEventListener('click', () => {
      bulkInputEl.value = '';
      bulkStatusEl.className = 'status-note';
      bulkStatusEl.textContent = '3/1 1577 みたいに貼れば、件数と平均を自動で出すよ。';
      saveState();
    });
    bulkInputEl.addEventListener('input', saveState);

    loadState();
  </script>
</body>
</html>
