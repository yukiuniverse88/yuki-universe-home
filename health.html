<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060405" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Health｜祐紀ユニバース</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <section class="view active">
      <div class="nav">
        <div class="nav-row">
          <button class="icon-btn" id="backHome" aria-label="ホームへ戻る">‹</button>
          <div class="nav-title"></div>
          <div class="nav-actions">
            <button class="sub-button" type="button" id="predictBtn">予測</button>
          </div>
        </div>
      </div>

      <div class="screen-head">
        <h1 class="screen-title">Health</h1>
      </div>

      <section class="editor-shell health-shell" style="min-height:auto;">
        <div class="health-form-grid">
          <label class="health-field health-field-full">
            <span class="health-field-label">Date</span>
            <input id="healthDateInput" class="health-input health-date-input" type="text" inputmode="numeric" placeholder="2026/03/24" autocomplete="off" spellcheck="false" />
          </label>

          <label class="health-field">
            <span class="health-field-label">Weight</span>
            <div class="health-input-wrap">
              <input id="weightInput" class="health-input" type="text" inputmode="decimal" placeholder="" />
              <span class="health-suffix">kg</span>
            </div>
          </label>

          <label class="health-field">
            <span class="health-field-label">Calories</span>
            <div class="health-input-wrap">
              <input id="calInput" class="health-input" type="text" inputmode="numeric" placeholder="" />
              <span class="health-suffix">kcal</span>
            </div>
          </label>
        </div>

        <div class="health-actions">
          <button class="sub-button secondary" type="button" id="todayBtn">今日</button>
          <button class="sub-button" type="button" id="saveHealthBtn">保存</button>
        </div>
      </section>

      <div class="section-title">Summary</div>
      <section class="sheet-card health-focus-card">
        <div class="health-focus-top">
          <div class="health-stat-eyebrow">体重の変化（開始から）</div>
          <div class="health-focus-period" id="recordPeriod">—</div>
        </div>

        <div class="health-focus-delta health-stat-value" id="weightChange">—</div>

        <div class="health-focus-row">
          <div class="health-focus-point">
            <div class="health-focus-label" id="weightStartDay">—</div>
            <div class="health-focus-weight" id="weightStartValue">—</div>
          </div>

          <div class="health-focus-arrow">→</div>

          <div class="health-focus-point">
            <div class="health-focus-label" id="weightLatestDay">—</div>
            <div class="health-focus-weight" id="weightLatestValue">—</div>
          </div>
        </div>

        <div class="health-stat-note" id="weightChangeNote">8/24 95kg → 今日の体重 をここに出すよ。</div>
      </section>

      <section class="health-stats-grid">
        <button class="sheet-card health-stat-card health-stat-button" type="button" id="monthAvgCard" aria-label="その月のカロリー一覧を編集">
          <div class="health-stat-card-top">
            <div class="health-stat-eyebrow">その月の平均カロリー</div>
            <span class="health-stat-linkbadge">編集</span>
          </div>
          <div class="health-stat-value" id="monthAvgCalories">—</div>
          <div class="health-stat-note" id="monthAvgCaloriesNote">選んだ月の一覧をテキストで開くよ。</div>
        </button>

        <button class="sheet-card health-stat-card health-stat-button" type="button" id="overallAvgCard" aria-label="全体のカロリー一覧を編集">
          <div class="health-stat-card-top">
            <div class="health-stat-eyebrow">全体平均カロリー</div>
            <span class="health-stat-linkbadge">編集</span>
          </div>
          <div class="health-stat-value" id="overallAvgCalories">—</div>
          <div class="health-stat-note" id="overallAvgCaloriesNote">全体一覧をテキストで開くよ。</div>
        </button>
      </section>
    </section>
  </div>

  <script>
    const healthLegacyKey = 'yuki_home_health_v4';
    const healthRecordsKey = 'yuki_home_health_records_v1';
    const healthSeedVersionKey = 'yuki_home_health_seed_version';
    const healthSeedVersion = '2026-03-25-seed-v5';
    const baselineWeight = 95;
    const baselineLabel = '8/24 95kg';

    const healthSeedRecords = [{"day":"2026-01-20","weight":"","calories":"1587"},{"day":"2026-01-21","weight":"92.0","calories":"1563"},{"day":"2026-01-22","weight":"","calories":"1701"},{"day":"2026-01-23","weight":"","calories":"1505"},{"day":"2026-01-24","weight":"","calories":"1646"},{"day":"2026-01-25","weight":"89.5","calories":"1700"},{"day":"2026-01-26","weight":"89.3","calories":"1794"},{"day":"2026-01-27","weight":"","calories":"1722"},{"day":"2026-01-28","weight":"89.6","calories":"1782"},{"day":"2026-01-29","weight":"","calories":"1618"},{"day":"2026-01-30","weight":"89.7","calories":"1506"},{"day":"2026-01-31","weight":"","calories":"1714"},{"day":"2026-02-01","weight":"89.1","calories":"1994"},{"day":"2026-02-02","weight":"88.8","calories":"1577"},{"day":"2026-02-03","weight":"89.1","calories":"1558"},{"day":"2026-02-04","weight":"88.8","calories":"1581"},{"day":"2026-02-05","weight":"89.3","calories":"1752"},{"day":"2026-02-06","weight":"","calories":"1521"},{"day":"2026-02-07","weight":"88.9","calories":"1803"},{"day":"2026-02-08","weight":"89.2","calories":"1283"},{"day":"2026-02-09","weight":"","calories":"2549"},{"day":"2026-02-10","weight":"","calories":"1570"},{"day":"2026-02-11","weight":"89.2","calories":"2092"},{"day":"2026-02-12","weight":"89.2","calories":"1589"},{"day":"2026-02-13","weight":"88.5","calories":"1486"},{"day":"2026-02-14","weight":"","calories":"1616"},{"day":"2026-02-15","weight":"88.3","calories":"1575"},{"day":"2026-02-16","weight":"88.8","calories":"1687"},{"day":"2026-02-17","weight":"88.8","calories":"2075"},{"day":"2026-02-18","weight":"89.1","calories":"1412"},{"day":"2026-02-19","weight":"","calories":"2388"},{"day":"2026-02-20","weight":"","calories":"1967"},{"day":"2026-02-21","weight":"","calories":"2138"},{"day":"2026-02-22","weight":"","calories":"2028"},{"day":"2026-02-23","weight":"","calories":"2700"},{"day":"2026-02-24","weight":"","calories":"2023"},{"day":"2026-02-25","weight":"89.6","calories":"1556"},{"day":"2026-02-26","weight":"","calories":"1552"},{"day":"2026-02-27","weight":"","calories":"2055"},{"day":"2026-02-28","weight":"89.0","calories":"1619"},{"day":"2026-03-01","weight":"88.8","calories":"1577"},{"day":"2026-03-02","weight":"88.9","calories":"1614"},{"day":"2026-03-03","weight":"88.2","calories":"1568"},{"day":"2026-03-04","weight":"","calories":"1763"},{"day":"2026-03-05","weight":"88.0","calories":"1528"},{"day":"2026-03-06","weight":"88.3","calories":"1969"},{"day":"2026-03-07","weight":"88.3","calories":"1729"},{"day":"2026-03-08","weight":"88.4","calories":"1972"},{"day":"2026-03-09","weight":"88.5","calories":"2362"},{"day":"2026-03-10","weight":"88.6","calories":"1641"},{"day":"2026-03-11","weight":"87.8","calories":"1665"},{"day":"2026-03-12","weight":"","calories":"1531"},{"day":"2026-03-13","weight":"87.6","calories":"1804"},{"day":"2026-03-14","weight":"87.8","calories":"2005"},{"day":"2026-03-15","weight":"","calories":"2076"},{"day":"2026-03-16","weight":"88.0","calories":"2233"},{"day":"2026-03-17","weight":"","calories":"1576"},{"day":"2026-03-18","weight":"88.2","calories":"1576"},{"day":"2026-03-19","weight":"88.0","calories":"2285"},{"day":"2026-03-20","weight":"","calories":"1416"},{"day":"2026-03-21","weight":"88.1","calories":"2700"},{"day":"2026-03-22","weight":"","calories":"1496"},{"day":"2026-03-23","weight":"87.9","calories":"1505"},{"day":"2026-03-24","weight":"","calories":"1660"}];
    const healthSeedCalorieCorrections = {"2026-03-01":"1577","2026-03-02":"1614","2026-03-03":"1568","2026-03-04":"1763","2026-03-05":"1528","2026-03-06":"1969","2026-03-07":"1729","2026-03-08":"1972","2026-03-09":"2362","2026-03-10":"1641","2026-03-11":"1665","2026-03-12":"1531","2026-03-13":"1804","2026-03-14":"2005","2026-03-15":"2076","2026-03-16":"2233","2026-03-17":"1576","2026-03-18":"1576","2026-03-19":"2285","2026-03-20":"1416","2026-03-21":"2700","2026-03-22":"1496","2026-03-23":"1505","2026-03-24":"1660"};

    function loadJson(key, fallback){
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }
    function saveJson(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
    function toNumber(value){
      if(value == null) return null;
      const cleaned = String(value).replace(/,/g, '').replace(/[^\d.\-]/g, '').trim();
      if(!cleaned) return null;
      const num = Number(cleaned);
      return Number.isFinite(num) ? num : null;
    }
    function getTodayKey(){
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function normalizeDay(value){
      if(!value) return '';
      const cleaned = String(value).trim().replace(/[./]/g, '-').replace(/\s+/g, '');
      const match = cleaned.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
      if(!match) return '';
      const [, year, month, date] = match;
      return `${year}-${String(month).padStart(2,'0')}-${String(date).padStart(2,'0')}`;
    }
    function formatInputDay(day){
      return day ? day.replaceAll('-', '/') : '';
    }
    function formatShortDay(day){
      if(!day) return '—';
      const [, month, date] = day.split('-');
      return `${Number(month)}/${Number(date)}`;
    }
    function formatWeight(value){
      return Number.isFinite(value) ? `${value.toFixed(1)}kg` : '—';
    }
    function formatCalories(value){
      return Number.isFinite(value) ? `${Math.round(value).toLocaleString('ja-JP')}kcal` : '—';
    }
    function formatDelta(value){
      if(!Number.isFinite(value)) return '—';
      const sign = value > 0 ? '+' : '';
      return `${sign}${value.toFixed(1)}kg`;
    }
    function mergeSeedRecords(existing, incoming){
      const map = new Map();
      (Array.isArray(existing) ? existing : []).forEach(record => {
        if(!record || !record.day) return;
        map.set(record.day, { day: record.day, weight: String(record.weight || '').trim(), calories: String(record.calories || '').trim() });
      });
      incoming.forEach(seed => {
        const current = map.get(seed.day);
        if(current){
          map.set(seed.day, {
            day: seed.day,
            weight: String(current.weight || '').trim() || String(seed.weight || '').trim(),
            calories: String(current.calories || '').trim() || String(seed.calories || '').trim()
          });
        } else {
          map.set(seed.day, { day: seed.day, weight: String(seed.weight || '').trim(), calories: String(seed.calories || '').trim() });
        }
      });
      return [...map.values()].sort((a,b) => a.day.localeCompare(b.day));
    }
    function applySeedCorrections(records){
      const map = new Map(records.map(record => [record.day, { ...record }]));
      Object.entries(healthSeedCalorieCorrections).forEach(([day, calories]) => {
        const current = map.get(day);
        if(current){
          current.calories = String(calories);
          map.set(day, current);
        } else {
          map.set(day, { day, weight:'', calories:String(calories) });
        }
      });
      return [...map.values()].sort((a,b) => a.day.localeCompare(b.day));
    }
    function ensureHealthSeedData(){
      if(localStorage.getItem(healthSeedVersionKey) === healthSeedVersion) return;
      const existing = loadJson(healthRecordsKey, []);
      const merged = mergeSeedRecords(existing, healthSeedRecords);
      const corrected = applySeedCorrections(merged);
      const legacy = loadJson(healthLegacyKey, null);
      if(legacy && (legacy.weight || legacy.calories)) {
        const today = getTodayKey();
        const prev = corrected.find(item => item.day === today) || { day: today, weight:'', calories:'' };
        const withLegacy = corrected.filter(item => item.day !== today);
        withLegacy.push({
          day: today,
          weight: String(prev.weight || '').trim() || String(legacy.weight || '').trim(),
          calories: String(prev.calories || '').trim() || String(legacy.calories || '').trim()
        });
        withLegacy.sort((a,b) => a.day.localeCompare(b.day));
        saveJson(healthRecordsKey, withLegacy);
      } else {
        saveJson(healthRecordsKey, corrected);
      }
      localStorage.setItem(healthSeedVersionKey, healthSeedVersion);
    }
    function getHealthRecords(){
      ensureHealthSeedData();
      const records = loadJson(healthRecordsKey, []);
      return Array.isArray(records) ? [...records].sort((a,b) => a.day.localeCompare(b.day)) : [];
    }
    function updatePageDay(day){
      const next = new URL(window.location.href);
      next.searchParams.set('day', day);
      history.replaceState(null, '', next.toString());
    }

    const pageParams = new URLSearchParams(window.location.search);
    const healthDateInput = document.getElementById('healthDateInput');
    const weightInput = document.getElementById('weightInput');
    const calInput = document.getElementById('calInput');
    const recordPeriod = document.getElementById('recordPeriod');
    const weightChange = document.getElementById('weightChange');
    const weightStartDay = document.getElementById('weightStartDay');
    const weightStartValue = document.getElementById('weightStartValue');
    const weightLatestDay = document.getElementById('weightLatestDay');
    const weightLatestValue = document.getElementById('weightLatestValue');
    const weightChangeNote = document.getElementById('weightChangeNote');
    const monthAvgCalories = document.getElementById('monthAvgCalories');
    const monthAvgCaloriesNote = document.getElementById('monthAvgCaloriesNote');
    const overallAvgCalories = document.getElementById('overallAvgCalories');
    const overallAvgCaloriesNote = document.getElementById('overallAvgCaloriesNote');
    const monthAvgCard = document.getElementById('monthAvgCard');
    const overallAvgCard = document.getElementById('overallAvgCard');

    function openCaloriesEditor(scope){
      const day = normalizeDay(healthDateInput.value) || getTodayKey();
      const month = day.slice(0, 7);
      window.location.href = `health-calories-editor.html?scope=${encodeURIComponent(scope)}&day=${encodeURIComponent(day)}&month=${encodeURIComponent(month)}`;
    }

    function loadEntryForSelectedDate(){
      const day = normalizeDay(healthDateInput.value) || getTodayKey();
      healthDateInput.value = formatInputDay(day);
      updatePageDay(day);
      const records = getHealthRecords();
      const entry = records.find(item => item.day === day);
      weightInput.value = entry?.weight || '';
      calInput.value = entry?.calories || '';
      renderHealth();
    }

    function saveHealth(){
      const day = normalizeDay(healthDateInput.value) || getTodayKey();
      const weight = weightInput.value.trim();
      const calories = calInput.value.trim();
      const records = getHealthRecords().filter(item => item.day !== day);
      if(weight || calories){
        records.push({ day, weight, calories });
      }
      records.sort((a,b) => a.day.localeCompare(b.day));
      saveJson(healthRecordsKey, records);
      saveJson(healthLegacyKey, { weight, calories });
      healthDateInput.value = formatInputDay(day);
      updatePageDay(day);
      renderHealth();
      alert('保存したよ。');
    }

    function renderHealth(){
      const selectedDay = normalizeDay(healthDateInput.value) || getTodayKey();
      const records = getHealthRecords();
      const calorieRecords = records.filter(item => Number.isFinite(toNumber(item.calories)));
      const weightRecords = records.filter(item => Number.isFinite(toNumber(item.weight)));
      const allCount = calorieRecords.length;
      const firstCalorieRecord = calorieRecords[0];

      if(firstCalorieRecord && allCount){
        recordPeriod.textContent = `${formatShortDay(firstCalorieRecord.day)}から ${allCount}日分`;
      } else {
        recordPeriod.textContent = 'まだ記録なし';
      }

      if(weightRecords.length >= 2){
        const start = weightRecords[0];
        const latest = weightRecords[weightRecords.length - 1];
        const startWeight = toNumber(start.weight);
        const latestWeight = toNumber(latest.weight);
        const delta = latestWeight - startWeight;
        weightChange.textContent = formatDelta(delta);
        weightChange.classList.toggle('is-loss', delta < 0);
        weightChange.classList.toggle('is-gain', delta > 0);
        weightStartDay.textContent = formatShortDay(start.day);
        weightStartValue.textContent = formatWeight(startWeight);
        weightLatestDay.textContent = formatShortDay(latest.day);
        weightLatestValue.textContent = formatWeight(latestWeight);

        const baselineDelta = latestWeight - baselineWeight;
        weightChangeNote.textContent = `${baselineLabel} → 今日 ${latestWeight.toFixed(1)}kg（${baselineDelta > 0 ? '+' : ''}${baselineDelta.toFixed(1)}kg）`;
      } else {
        weightChange.textContent = '—';
        weightChange.classList.remove('is-loss', 'is-gain');
        weightStartDay.textContent = '—';
        weightStartValue.textContent = '—';
        weightLatestDay.textContent = '—';
        weightLatestValue.textContent = '—';
        weightChangeNote.textContent = `${baselineLabel} → 今日の体重 をここに出すよ。`;
      }

      if(calorieRecords.length){
        const total = calorieRecords.reduce((sum, item) => sum + toNumber(item.calories), 0);
        const avg = total / calorieRecords.length;
        overallAvgCalories.textContent = formatCalories(avg);
        overallAvgCaloriesNote.textContent = `${calorieRecords.length}件のカロリー記録で計算 · タップで編集`;
      } else {
        overallAvgCalories.textContent = '—';
        overallAvgCaloriesNote.textContent = '全体一覧をテキストで開くよ。';
      }

      const selectedMonth = selectedDay.slice(0, 7);
      const monthRecords = calorieRecords.filter(item => item.day.startsWith(selectedMonth));
      if(monthRecords.length){
        const total = monthRecords.reduce((sum, item) => sum + toNumber(item.calories), 0);
        const avg = total / monthRecords.length;
        monthAvgCalories.textContent = formatCalories(avg);
        monthAvgCaloriesNote.textContent = `${selectedMonth.replace('-', '.')} の ${monthRecords.length}件で計算 · タップで編集`;
      } else {
        monthAvgCalories.textContent = '—';
        monthAvgCaloriesNote.textContent = '選んだ月の一覧をテキストで開くよ。';
      }
    }

    document.getElementById('backHome').addEventListener('click', () => {
      window.location.href = 'index.html';
    });
    document.getElementById('predictBtn').addEventListener('click', () => {
      window.location.href = 'average-predict-generator-daily.html';
    });
    document.getElementById('todayBtn').addEventListener('click', () => {
      healthDateInput.value = formatInputDay(getTodayKey());
      loadEntryForSelectedDate();
    });
    document.getElementById('saveHealthBtn').addEventListener('click', saveHealth);
    healthDateInput.addEventListener('change', loadEntryForSelectedDate);
    healthDateInput.addEventListener('blur', loadEntryForSelectedDate);
    monthAvgCard.addEventListener('click', () => openCaloriesEditor('month'));
    overallAvgCard.addEventListener('click', () => openCaloriesEditor('all'));

    ensureHealthSeedData();
    healthDateInput.value = formatInputDay(normalizeDay(pageParams.get('day')) || getTodayKey());
    loadEntryForSelectedDate();
  </script>
</body>
</html>
