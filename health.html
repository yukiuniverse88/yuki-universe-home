<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060405" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Health｜祐紀ユニバース</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <section class="view active">
      <div class="nav">
        <div class="nav-row">
          <button class="icon-btn" id="backHome" aria-label="ホームへ戻る">‹</button>
          <div class="nav-title">Health</div>
          <div class="nav-actions"></div>
        </div>
      </div>
      <div class="screen-head">
        <h1 class="screen-title">Health</h1>
        <div class="screen-count" style="color:var(--sub);">見せすぎない記録。必要な時だけ開く。</div>
      </div>
      <div class="editor-shell" style="min-height:auto;gap:16px;">
        <div>
          <div class="section-title" style="margin-top:0;">Weight</div>
          <input id="weightInput" class="editor-title" type="text" placeholder="例: 65.2kg" style="font-size:22px;font-weight:650;background:rgba(255,255,255,.04);border-radius:18px;padding:14px 16px;" />
        </div>
        <div>
          <div class="section-title" style="margin-top:0;">Calories</div>
          <input id="calInput" class="editor-title" type="text" placeholder="例: 1800kcal" style="font-size:22px;font-weight:650;background:rgba(255,255,255,.04);border-radius:18px;padding:14px 16px;" />
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;">
          <button class="sub-button" type="button" onclick="saveHealth()" style="flex:1;">保存</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const healthKey = 'yuki_home_health_v4';

    function loadJson(key, fallback){
      try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }catch{ return fallback; }
    }
    function saveJson(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
    function getHealthData(){ return loadJson(healthKey, {weight:'', calories:''}); }

    const weightInput = document.getElementById('weightInput');
    const calInput = document.getElementById('calInput');

    function loadHealth(){
      const health = getHealthData();
      weightInput.value = health.weight || '';
      calInput.value = health.calories || '';
    }

    function saveHealth(){
      const weight = weightInput.value.trim();
      const calories = calInput.value.trim();
      saveJson(healthKey, { weight, calories });
      alert('保存したよ。');
    }

    document.getElementById('backHome').addEventListener('click', () => { window.location.href = 'index.html'; });

    loadHealth();
  </script>
</body>
</html>
