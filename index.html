<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060405" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>祐紀ユニバース｜帰る家</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <section id="view-home" class="view active home-view">
      <main class="home-wrap">
        <header class="brand">
          <div class="brand-title">Y U K I&nbsp;&nbsp;U N I V E R S E</div>
        </header>

        <section class="hero">
          <div class="date" id="dateText"></div>
          <h1 class="welcome" id="welcomeText">おかえり。<br>今日はどこから触れる？</h1>
        </section>

        <div class="home-title">Now, touch</div>
        <section class="main-grid">
          <button class="card feature-card memo-card" type="button" id="openMemoFromHome">
            <div class="icon">✎</div>
            <h2 class="label">Memo</h2>
          </button>

          <button class="card feature-card living-card" type="button" id="openLivingFromHome">
            <div class="icon">⌂</div>
            <h2 class="label">Living</h2>
          </button>

          <button class="card feature-card rooms-card" type="button" id="openRoomsFromHome">
            <div class="icon">☾</div>
            <h2 class="label">Rooms</h2>
          </button>

          <button class="card feature-card treasures-card" type="button" id="openTreasuresFromHome">
            <div class="icon">✦</div>
            <h2 class="label">Treasures</h2>
          </button>
        </section>

        <div class="home-title">Today</div>
        <section class="today-stack">
          <article class="card mood-card">
            <p class="small-title">TODAY'S MOOD</p>
            <div class="compact-status" id="moodStatusText">未記録</div>
            <div class="mood-line">
              <div class="mood-symbols">
                <button class="pill" type="button" data-mood="◎" onclick="saveMood('◎')">◎</button>
                <button class="pill" type="button" data-mood="○" onclick="saveMood('○')">○</button>
                <button class="pill" type="button" data-mood="△" onclick="saveMood('△')">△</button>
                <button class="pill" type="button" data-mood="×" onclick="saveMood('×')">×</button>
              </div>
              <button class="history-button" type="button" onclick="openMoodHistory()">History</button>
            </div>
          </article>

          <div class="duo-grid">
            <button class="card bottom-card diary-card" type="button" id="openDiaryFromHome">
              <div>
                <p class="small-title">DIARY</p>
                <div class="simple-icon diary-icon">✎</div>
                <div class="compact-status" id="diaryBadge">Mood: —</div>
              </div>
              <span class="sub-button" style="text-align:center;">Open</span>
            </button>

            <button class="card bottom-card" type="button" id="openHealthFromHome">
              <div>
                <p class="small-title">HEALTH</p>
                <div class="simple-icon health-icon">♡</div>
                <div class="compact-status" id="healthSummary">Weight / Calories</div>
              </div>
              <span class="sub-button" style="text-align:center;">Open</span>
            </button>
          </div>
        </section>
        <div class="home-spacer"></div>
      </main>
    </section>
  </div>

  <div class="simple-sheet-backdrop" id="simpleSheetBackdrop" onclick="closeSheet(event)">
    <section class="simple-sheet" id="simpleSheetContent" onclick="event.stopPropagation()"></section>
  </div>

  <script>
    const moodKey = 'yuki_home_moods_v4';
    const diaryKey = 'yuki_home_diaries_v4';
    const healthKey = 'yuki_home_health_v4';

    function loadJson(key, fallback){
      try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }catch{ return fallback; }
    }
    function saveJson(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
    function escapeHtml(str=''){
      return str.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }
    function getTodayKey(){
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function formatHomeDate(){
      const d = new Date();
      const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${days[d.getDay()]}`;
    }
    function getMoodMap(){ return loadJson(moodKey, {}); }
    function getHealthData(){ return loadJson(healthKey, {weight:'', calories:''}); }
    function currentMood(){ return getMoodMap()[getTodayKey()] || ''; }

    const dateText = document.getElementById('dateText');
    const welcomeText = document.getElementById('welcomeText');
    const moodStatusText = document.getElementById('moodStatusText');
    const diaryBadge = document.getElementById('diaryBadge');
    const healthSummary = document.getElementById('healthSummary');
    const simpleSheetBackdrop = document.getElementById('simpleSheetBackdrop');
    const simpleSheetContent = document.getElementById('simpleSheetContent');

    function renderHome(){
      if(dateText) dateText.textContent = formatHomeDate();
      const welcomes = [
        'おかえり。<br>今日はどこから触れる？',
        'おかえり。<br>まずはここで、ひと息。',
        'おかえり。<br>今日もちゃんと、ここが祐紀の家。'
      ];
      const dayIndex = new Date().getDate() % welcomes.length;
      if(welcomeText) welcomeText.innerHTML = welcomes[dayIndex];
      const mood = currentMood();
      if(moodStatusText) moodStatusText.textContent = mood ? `今日の気分: ${mood}` : '未記録';
      document.querySelectorAll('.pill[data-mood]').forEach(btn => btn.classList.toggle('active', btn.dataset.mood === mood));
      if(diaryBadge) diaryBadge.textContent = `Mood: ${mood || '—'}`;
      const health = getHealthData();
      if(healthSummary) healthSummary.textContent = `${health.weight || 'Weight'} / ${health.calories || 'Calories'}`;
    }

    function saveMood(symbol){
      const data = getMoodMap();
      data[getTodayKey()] = symbol;
      saveJson(moodKey, data);
      renderHome();
    }

    function openMoodHistory(){
      const data = getMoodMap();
      const rows = Object.entries(data).sort((a,b)=>a[0] < b[0] ? 1 : -1).slice(0,30)
        .map(([day,val]) => `${day}  ${val}`).join('\n') || 'まだ記録がないよ。';
      openSimpleSheet('Mood History', rows.replaceAll('-', '.'));
    }

    function openSimpleSheet(title, text){
      simpleSheetContent.innerHTML = `<h3>${escapeHtml(title)}</h3><p>${escapeHtml(text)}</p><div class="row"><button class="sub-button" type="button" onclick="closeSheet()">閉じる</button></div>`;
      simpleSheetBackdrop.classList.add('show');
    }
    function closeSheet(event){
      if(event && event.target !== simpleSheetBackdrop) return;
      simpleSheetBackdrop.classList.remove('show');
    }

    document.getElementById('openMemoFromHome').addEventListener('click', () => { window.location.href = 'memo.html'; });
    document.getElementById('openDiaryFromHome').addEventListener('click', () => { window.location.href = 'diary.html'; });
    document.getElementById('openHealthFromHome').addEventListener('click', () => { window.location.href = 'health.html'; });
    document.getElementById('openLivingFromHome').addEventListener('click', () => openSimpleSheet('Living','みんながいる共有のリビング。\nここは次の制作でつないでいく場所。'));
    document.getElementById('openRoomsFromHome').addEventListener('click', () => openSimpleSheet('Rooms','それぞれの部屋へ入る入口。\nRoomsはあとで本設計する予定。'));
    document.getElementById('openTreasuresFromHome').addEventListener('click', () => openSimpleSheet('Treasures','宝物や思い出の保管場所。\nここも次の制作で育てていく。'));

    renderHome();
  </script>
</body>
</html>
