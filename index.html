<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060405" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>祐紀ユニバース｜帰る家</title>
  <style>
    :root{
      --bg:#060405;
      --bg-2:#0b0708;
      --surface:#191516;
      --surface-2:#221d1f;
      --surface-3:#2b2527;
      --line:rgba(255,255,255,.08);
      --text:#f7f3f1;
      --sub:#bcaeaa;
      --muted:#8f8480;
      --gold:#f3c96f;
      --move:#6c6bf0;
      --danger:#f16464;
      --shadow:0 14px 30px rgba(0,0,0,.24);
      --radius:24px;
      --row-h:88px;
      --action-w:84px;
      --fab-bottom:calc(36px + env(safe-area-inset-bottom));
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{margin:0;height:100%;width:100%;overflow-x:hidden;background:#060405;overscroll-behavior-x:none;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
      color:var(--text);
      background:
        radial-gradient(140% 52% at 50% -8%, rgba(110,34,18,.14) 0%, rgba(110,34,18,.10) 18%, rgba(110,34,18,0) 58%),
        radial-gradient(34% 22% at 82% 26%, rgba(106,70,198,.12) 0%, rgba(106,70,198,0) 70%),
        linear-gradient(180deg,#090707 0%, #060405 72%, #050404 100%);
      overscroll-behavior-y:none;
      -webkit-text-size-adjust:100%;
    }
    body::before{
      content:"";position:fixed;inset:0 0 auto 0;height:max(18px, env(safe-area-inset-top));background:#060405;pointer-events:none;z-index:0;
    }
    .app{
      width:min(540px,100%);
      max-width:100%;
      margin:0 auto;
      min-height:100dvh;
      padding:0 18px calc(24px + env(safe-area-inset-bottom));
      position:relative;
      z-index:1;
      overflow-x:hidden;
    }
    .view{display:none;min-height:100dvh;}
    .view.active{display:block;}
    .nav{
      position:sticky; top:0; z-index:40;
      padding-top:max(8px, env(safe-area-inset-top));
      margin:0 -18px;
      padding-left:18px; padding-right:18px;
      background:linear-gradient(180deg, rgba(6,4,5,.94) 0%, rgba(6,4,5,.82) 70%, rgba(6,4,5,0) 100%);
      backdrop-filter:blur(16px);
    }
    .nav-row{
      min-height:58px;
      display:grid;
      grid-template-columns:56px 1fr auto;
      align-items:center;
      gap:12px;
    }
    .nav-title{
      font-size:17px;
      font-weight:700;
      text-align:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .nav-sub{
      margin-top:-2px;
      text-align:center;
      font-size:12px;
      color:var(--muted);
      padding-bottom:8px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .nav-actions{display:flex;align-items:center;gap:10px;justify-self:end;}
    .icon-btn,.text-btn,.fab,.tool-round{
      border:none;
      color:var(--text);
      background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.03));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      font-family:inherit;
      cursor:pointer;
    }
    .icon-btn{
      width:50px;height:50px;border-radius:20px;display:grid;place-items:center;
      font-size:26px;line-height:1;flex:0 0 auto;
    }
    .icon-btn.small{width:42px;height:42px;border-radius:16px;font-size:20px;box-shadow:none;background:rgba(255,255,255,.04);}
    .text-btn{
      height:50px;border-radius:20px;padding:0 18px;font-size:17px;font-weight:650;
    }
    .text-btn.quiet{padding:0 14px;background:rgba(255,255,255,.028);}
    .screen-head{padding:8px 0 14px;}
    .screen-title{font-size:32px;font-weight:800;letter-spacing:-.04em;line-height:1.08;margin:0;}
    .screen-count{font-size:15px;color:var(--muted);margin-top:4px;}
    .section-title{
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
      margin:18px 2px 10px;
    }
    .list-card,.editor-shell,.sheet-card,.menu-card{
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.016));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }
    .list-card::before,.editor-shell::before,.sheet-card::before,.menu-card::before{
      content:""; position:absolute; inset:0; pointer-events:none;
      background:radial-gradient(circle at top right, rgba(255,255,255,.04), transparent 34%);
    }

    /* folders */
    .folder-row{
      min-height:70px;
      display:flex;align-items:center;gap:12px;
      padding:0 14px;
      border:none;width:100%;background:transparent;color:inherit;
      text-align:left;font-family:inherit;cursor:pointer;
      position:relative;
    }
    .folder-row + .folder-row{border-top:1px solid var(--line);}
    .folder-row.editing{background:rgba(255,255,255,.025);}
    .folder-icon{
      width:34px;height:34px;border-radius:11px;display:grid;place-items:center;flex:0 0 auto;
      color:var(--gold); background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08);
      font-size:18px;
    }
    .folder-main{min-width:0;flex:1;display:flex;align-items:center;gap:12px;}
    .folder-name{font-size:18px;font-weight:560;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .folder-count{font-size:15px;color:var(--muted);margin-left:auto;padding-left:12px;white-space:nowrap;}
    .folder-chevron{font-size:20px;color:var(--muted);}
    .folder-edit-actions{display:none;align-items:center;gap:12px;margin-left:10px;}
    .folder-row.editing .folder-chevron,.folder-row.editing .folder-count{display:none;}
    .folder-row.editing .folder-edit-actions{display:flex;}
    .dots-icon{color:var(--gold);font-size:22px;line-height:1;opacity:.95;}
    .drag-handle{
      width:18px;height:18px;position:relative;opacity:.9;
    }
    .drag-handle::before,.drag-handle::after,.drag-handle span{
      content:""; position:absolute; left:0; right:0; height:2px; background:rgba(255,255,255,.52); border-radius:999px;
    }
    .drag-handle::before{top:3px;}
    .drag-handle span{top:8px;}
    .drag-handle::after{top:13px;}
    .folder-row.dragging{opacity:.9; background:rgba(255,255,255,.06); z-index:4;}
    .drag-handle{touch-action:none; cursor:grab;}
    .folder-row.drop-target{box-shadow:inset 0 2px 0 rgba(255,255,255,.18);}

    /* notes */
    .note-section{margin-bottom:16px;}
    .note-group{overflow:hidden;}
    .swipe-row{position:relative;overflow:hidden;min-height:var(--row-h);}
    .swipe-row + .swipe-row{border-top:1px solid var(--line);}
    .swipe-actions{
      position:absolute; top:0; right:0; bottom:0; display:flex; align-items:stretch; justify-content:flex-end;
      width:calc(var(--action-w) * 2);
    }
    .swipe-action{
      width:var(--action-w); border:none; color:#fff; font-family:inherit; font-size:14px; font-weight:700;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    }
    .swipe-action.move{background:var(--move);}
    .swipe-action.delete{background:var(--danger);}
    .swipe-action .icon{font-size:24px;line-height:1;}
    .note-front{
      position:relative; z-index:2; width:100%; min-height:var(--row-h);
      background:linear-gradient(180deg, rgba(29,24,26,.98), rgba(24,20,21,.98));
      border:none; color:inherit; text-align:left; font-family:inherit; cursor:pointer;
      transform:translateX(0); transition:transform .18s ease;
      padding:12px 14px 12px 18px;
      touch-action:pan-y;
    }
    .swipe-row.open .note-front{transform:translateX(calc(var(--action-w) * -2));}
    .note-title{font-size:17px;font-weight:740;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .note-preview{margin-top:4px;font-size:15px;color:var(--sub);line-height:1.35;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;min-height:1.35em;}
    .note-subline{margin-top:7px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .note-folder-chip{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
    .tiny-folder{font-size:15px;color:var(--gold);}
    .empty{padding:22px 18px;color:var(--muted);text-align:center;line-height:1.7;}

    /* editor */
    .editor-shell{padding:16px 16px 22px;min-height:calc(100dvh - 150px);display:flex;flex-direction:column;gap:12px;}
    .chip-row{display:flex;gap:8px;flex-wrap:wrap;}
    .chip{height:34px;padding:0 12px;border-radius:999px;border:1px solid var(--line);display:inline-flex;align-items:center;font-size:13px;color:var(--sub);background:rgba(255,255,255,.04);}
    .editor-title{border:none;outline:none;background:transparent;color:var(--text);font-family:inherit;font-size:28px;font-weight:800;line-height:1.22;padding:2px 0 0;}
    .editor-body{border:none;outline:none;background:transparent;color:var(--text);font-family:inherit;font-size:18px;line-height:1.7;resize:none;flex:1;min-height:320px;padding:0;}
    .editor-title::placeholder,.editor-body::placeholder{color:rgba(255,255,255,.35);}

    /* floating */
    .fab{
      position:fixed;
      right:max(18px, calc((100vw - min(540px, 100vw))/2 + 18px));
      bottom:var(--fab-bottom);
      width:58px;height:58px;border-radius:21px;display:grid;place-items:center;font-size:30px;z-index:50;color:var(--text);
    }
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);backdrop-filter:blur(10px);display:none;z-index:80;align-items:flex-end;justify-content:center;padding:18px 18px calc(18px + env(safe-area-inset-bottom));}
    .overlay.show{display:flex;}
    .sheet-card{width:min(540px,100%);max-height:78dvh;overflow:auto;padding:14px;}
    .sheet-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-bottom:6px;}
    .sheet-title{font-size:18px;font-weight:780;}
    .picker-item{display:flex;align-items:center;gap:12px;width:100%;padding:12px 10px;border:none;background:transparent;color:inherit;text-align:left;font-family:inherit;}
    .picker-item + .picker-item{border-top:1px solid var(--line);}
    .picker-item[disabled]{opacity:.45;}
    .menu-wrap{position:fixed;inset:0;display:none;z-index:90;}
    .menu-wrap.show{display:block;}
    .menu-backdrop{position:absolute;inset:0;}
    .menu-card{position:absolute;top:calc(max(70px, env(safe-area-inset-top) + 56px));right:max(18px, calc((100vw - min(540px, 100vw))/2 + 18px));width:220px;padding:8px;display:flex;flex-direction:column;gap:6px;}
    .menu-item{height:46px;border:none;border-radius:16px;background:rgba(255,255,255,.04);color:var(--text);font-family:inherit;font-size:15px;font-weight:650;text-align:left;padding:0 14px;}
    .menu-item.delete{background:rgba(241,100,100,.13);color:#ffb1b1;}

    .spacer{height:4px;}

    @media (max-width:390px){
      :root{--row-h:84px; --action-w:78px;}
      .screen-title{font-size:28px;}
      .folder-name{font-size:17px;}
      .folder-count{font-size:14px;}
      .note-title{font-size:16px;}
      .note-preview{font-size:14px;}
      .editor-title{font-size:24px;}
      .editor-body{font-size:17px;}
      .icon-btn,.text-btn{height:48px;}
      .icon-btn{width:48px;}
      .nav-row{min-height:56px;}
    }
  
    .home-view{padding-top:max(18px, env(safe-area-inset-top));}
    .home-wrap{display:flex;flex-direction:column;gap:18px;padding-bottom:calc(26px + env(safe-area-inset-bottom));}
    .brand{display:flex;align-items:center;justify-content:flex-start;padding:8px 2px 0;overflow:hidden;}
    .brand-title{letter-spacing:.28em;font-weight:300;font-size:clamp(13px,4vw,16px);color:rgba(255,255,255,.72);white-space:nowrap;}
    .hero{background:linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.018));border:1px solid var(--line);border-radius:32px;padding:22px 20px 24px;box-shadow:var(--shadow);position:relative;overflow:hidden;min-height:180px;display:flex;flex-direction:column;justify-content:space-between;}
    .hero::after{content:"";position:absolute;right:-34px;bottom:-34px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle, rgba(143,91,255,.18), transparent 67%);pointer-events:none;}
    .date{font-size:13px;letter-spacing:.08em;color:var(--muted);margin-bottom:18px;}
    .welcome{font-size:31px;line-height:1.35;font-weight:700;margin:0;max-width:10em;letter-spacing:-.02em;}
    .home-title{font-size:12px;color:var(--muted);letter-spacing:.14em;padding:0 4px;text-transform:uppercase;}
    .main-grid{display:grid;gap:14px;grid-template-columns:repeat(2,minmax(0,1fr));width:100%;}
    .card{border-radius:26px;padding:18px 16px;background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));border:1px solid var(--line);box-shadow:var(--shadow);position:relative;overflow:hidden;min-width:0;}
    .card::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at top right, rgba(255,255,255,.05), transparent 30%);pointer-events:none;}
    button.card{width:100%;text-align:left;color:inherit;cursor:pointer;border:none;font-family:inherit;}
    .feature-card{min-height:132px;display:flex;flex-direction:column;justify-content:space-between;gap:18px;}
    .feature-card .icon{width:44px;height:44px;border-radius:15px;display:grid;place-items:center;font-size:22px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.035);flex:0 0 auto;}
    .label{font-size:22px;font-weight:700;margin:0;}
    .memo-card .icon{color:#8fc8ff;border-color:rgba(143,200,255,.24);}
    .living-card .icon{color:#8f5bff;border-color:rgba(143,91,255,.28);}
    .rooms-card .icon{color:#e8a3b2;border-color:rgba(232,163,178,.28);}
    .treasures-card .icon{color:#9dd989;border-color:rgba(157,217,137,.24);}
    .today-stack{display:flex;flex-direction:column;gap:14px;width:100%;}
    .mood-card{padding:18px 16px;min-height:118px;}
    .small-title{font-size:12px;letter-spacing:.12em;color:var(--muted);margin:0;text-transform:uppercase;}
    .compact-status{font-size:14px;color:var(--sub);line-height:1.5;margin-top:10px;min-height:20px;}
    .mood-line{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px;}
    .mood-symbols{display:flex;align-items:center;gap:10px;min-width:0;flex-wrap:nowrap;}
    .pill{width:46px;height:46px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.032);color:var(--text);font-size:22px;cursor:pointer;font-family:inherit;flex:0 0 auto;}
    .pill.active{border-color:rgba(232,163,178,.55);box-shadow:0 0 0 1px rgba(232,163,178,.18) inset;color:#ffd1dc;}
    .history-button,.sub-button{height:46px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--text);font-size:16px;font-weight:650;cursor:pointer;font-family:inherit;padding:0 16px;white-space:nowrap;}
    .history-button{flex:0 0 auto;min-width:106px;}
    .duo-grid{display:grid;gap:14px;grid-template-columns:repeat(2,minmax(0,1fr));width:100%;}
    .bottom-card{min-height:186px;display:flex;flex-direction:column;justify-content:space-between;gap:14px;}
    .simple-icon{font-size:40px;line-height:1;margin-top:8px;}
    .diary-icon{color:#8fc8ff;}
    .health-icon{color:#ffcc7a;}
    .home-spacer{height:8px;}
    .simple-sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.56);display:none;align-items:flex-end;justify-content:center;padding:18px 18px calc(18px + env(safe-area-inset-bottom));z-index:70;backdrop-filter:blur(8px);}
    .simple-sheet-backdrop.show{display:flex;}
    .simple-sheet{width:min(540px, 100%);max-height:calc(100dvh - max(88px, env(safe-area-inset-top) + 52px));overflow:auto;-webkit-overflow-scrolling:touch;background:linear-gradient(180deg, rgba(28,23,24,.98), rgba(18,15,16,.98));border:1px solid var(--line);border-radius:28px 28px 18px 18px;box-shadow:var(--shadow);padding:20px 18px calc(20px + env(safe-area-inset-bottom));}
    .simple-sheet h3{margin:0 0 10px;font-size:22px;}
    .sheet-title-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;}
    .sheet-title-row h3{margin:0;}
    .simple-sheet p{margin:0;color:var(--sub);line-height:1.7;white-space:pre-wrap;}
    .simple-sheet textarea,.simple-sheet input{width:100%;border:none;outline:none;color:var(--text);background:rgba(255,255,255,.04);border-radius:18px;padding:14px 14px;font:inherit;margin-top:12px;}
    .simple-sheet .row{display:flex;gap:10px;margin-top:14px;}
    .simple-sheet .row .sub-button{flex:1;}
    .diary-sheet-meta{font-size:14px;color:var(--sub);margin-top:2px;position:sticky;top:-2px;background:linear-gradient(180deg, rgba(28,23,24,.98), rgba(28,23,24,.92));padding-bottom:8px;z-index:1;}
    .diary-sheet-meta strong{color:var(--text);font-weight:700;}
    .diary-list{display:flex;flex-direction:column;gap:10px;margin-top:14px;max-height:min(62dvh, 560px);overflow:auto;padding-right:2px;}
    .diary-item{width:100%;border:none;text-align:left;color:inherit;font-family:inherit;cursor:pointer;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:20px;padding:14px 14px 13px;display:flex;flex-direction:column;gap:8px;}
    .diary-item.compact{padding:12px 14px;gap:6px;opacity:.96;}
    .diary-item-head{display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .diary-item-date{font-size:14px;font-weight:700;letter-spacing:.02em;}
    .diary-item-mood{font-size:17px;line-height:1;color:#ffd1dc;flex:0 0 auto;}
    .diary-item-preview{font-size:15px;line-height:1.6;color:var(--sub);display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;white-space:pre-wrap;word-break:break-word;}
    .diary-item-noteonly{font-size:13px;color:var(--muted);}
    .diary-empty{padding:18px 4px 8px;color:var(--muted);line-height:1.7;text-align:center;}
    .diary-textarea{min-height:230px;resize:vertical;}
    .diary-mood-picker{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px;}
    .diary-mood-picker .pill{width:42px;height:42px;font-size:20px;}
    .diary-photo-inline{margin-top:14px;display:flex;align-items:center;gap:12px;min-width:0;}
    .diary-photo-inline.empty{display:block;}
    .diary-photo-thumb{width:94px;height:94px;border:none;border-radius:20px;overflow:hidden;flex:0 0 auto;border:1px solid var(--line);background:rgba(255,255,255,.03);padding:0;cursor:pointer;box-shadow:var(--shadow);}
    .diary-photo-thumb img{display:block;width:100%;height:100%;object-fit:cover;background:#0d0a0b;}
    .diary-photo-actions{display:flex;flex-direction:column;gap:10px;min-width:0;flex:1;}
    .diary-photo-actions .sub-button{width:100%;}
    .sub-button.secondary{background:rgba(255,255,255,.022);}
    .sub-button.danger{background:rgba(241,100,100,.13);color:#ffb1b1;}
    .diary-item-body{display:flex;align-items:flex-start;gap:12px;}
    .diary-item-text{min-width:0;flex:1;}
    .diary-item-thumb{width:72px;height:72px;border-radius:16px;overflow:hidden;flex:0 0 auto;border:1px solid var(--line);background:rgba(255,255,255,.03);}
    .diary-item-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
    .diary-lightbox{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:18px;z-index:95;background:rgba(0,0,0,.76);backdrop-filter:blur(10px);}
    .diary-lightbox.show{display:flex;}
    .diary-lightbox-card{position:relative;width:min(560px,100%);max-height:86dvh;border-radius:28px;overflow:hidden;border:1px solid var(--line);background:rgba(18,15,16,.98);box-shadow:var(--shadow);}
    .diary-lightbox-card img{display:block;width:100%;max-height:86dvh;object-fit:contain;background:#090707;}
    .diary-lightbox-close{position:absolute;top:12px;right:12px;z-index:2;}
@media (max-width:390px){
      .welcome{font-size:28px;}
      .pill{width:42px;height:42px;font-size:20px;}
      .history-button{min-width:92px;padding:0 12px;}
      .brand-title{letter-spacing:.24em;font-size:14px;}
      .duo-grid{gap:12px;}
      .card{border-radius:24px;}
    }

  </style>
</head>
<body>
  <div class="app">

    <section id="view-home" class="view active home-view">
      <main class="home-wrap">
        <header class="brand">
          <div class="brand-title">Y U K I&nbsp;&nbsp;U N I V E R S E</div>
        </header>

        <section class="hero">
          <div class="date" id="dateText"></div>
          <h1 class="welcome" id="welcomeText">おかえり。<br>今日はどこから触れる？</h1>
        </section>

        <div class="home-title">Now, touch</div>
        <section class="main-grid">

  <script>
    const STORAGE_KEYS = ['yuki-universe-memo-v4','yuki-universe-memo-v3','yuki-universe-memo-v2','yuki-universe-memo-v1'];
    const ACTIVE_STORAGE_KEY = STORAGE_KEYS[0];
    const ALL_FOLDER_ID = '__all__';
    const moodKey = 'yuki_home_moods_v4';
    const diaryKey = 'yuki_home_diaries_v4';
    const healthKey = 'yuki_home_health_v4';

    function uid(){ return 'id-' + Math.random().toString(36).slice(2,11); }

    const DEFAULT_DATA = {
      folders: [
        { id:'life', name:'Life', notes:[
          { id:uid(), title:'買うものメモ', body:'牛乳\n卵\n洗剤\nトイレットペーパー', updatedAt: Date.now() - 1000*60*52 },
          { id:uid(), title:'晩ごはん候補', body:'カレー / うどん / 餃子', updatedAt: Date.now() - 1000*60*60*26 }
        ]},
        { id:'kids', name:'Kids', notes:[
          { id:uid(), title:'勇誠メモ', body:'学校の持ち物確認\n水筒\n連絡帳', updatedAt: Date.now() - 1000*60*60*5 }
        ]},
        { id:'universe', name:'Universe', notes:[
          { id:uid(), title:'ホーム訂正点', body:'Roomsは最後でよさそう\nMemoとDiaryを先に固める', updatedAt: Date.now() - 1000*60*60*3 },
          { id:uid(), title:'Living案', body:'共通空間。立ち絵や一言の入口。', updatedAt: Date.now() - 1000*60*60*56 }
        ]},
        { id:'shopping', name:'Shopping', notes:[] },
        { id:'free', name:'Free', notes:[] }
      ]
    };

    const views = {
      home: document.getElementById('view-home'),
      folders: document.getElementById('view-folders'),
      notes: document.getElementById('view-notes'),
      editor: document.getElementById('view-editor')
    };

    const dateText = document.getElementById('dateText');
    const welcomeText = document.getElementById('welcomeText');
    const moodStatusText = document.getElementById('moodStatusText');
    const diaryBadge = document.getElementById('diaryBadge');
    const healthSummary = document.getElementById('healthSummary');
    const simpleSheetBackdrop = document.getElementById('simpleSheetBackdrop');
    const simpleSheetContent = document.getElementById('simpleSheetContent');
    const folderListEl = document.getElementById('folderList');
    const noteSectionsEl = document.getElementById('noteSections');
    const notesNavTitle = document.getElementById('notesNavTitle');
    const notesNavSub = document.getElementById('notesNavSub');
    const notesScreenTitle = document.getElementById('notesScreenTitle');
    const notesScreenSubtitle = document.getElementById('notesScreenSubtitle');
    const editorFolderTag = document.getElementById('editorFolderTag');
    const editorDateTag = document.getElementById('editorDateTag');
    const editorTitle = document.getElementById('editorTitle');
    const editorBody = document.getElementById('editorBody');
    const editorNavTitle = document.getElementById('editorNavTitle');
    const editorNavSub = document.getElementById('editorNavSub');
    const fab = document.getElementById('fab');
    const moveOverlay = document.getElementById('moveOverlay');
    const moveFolderList = document.getElementById('moveFolderList');
    const menuWrap = document.getElementById('menuWrap');
    const menuCard = document.getElementById('menuCard');
    const diaryImageInput = document.getElementById('diaryImageInput');
    const diaryRestoreInput = document.getElementById('diaryRestoreInput');
    const diaryLightbox = document.getElementById('diaryLightbox');
    const diaryLightboxImage = document.getElementById('diaryLightboxImage');

    let state = loadData();
    let currentView = 'home';
    let currentFolderId = ALL_FOLDER_ID;
    let lastUsedFolderId = state.folders[0]?.id || null;
    let currentNoteId = null;
    let currentDiaryId = null;
    let currentDiaryDraft = null;
    let folderEditMode = false;
    let draggingFolderId = null;
    let openSwipeRow = null;
    let moveTargetNoteId = null;
    let lastSnapshot = '';
    let draftChanged = false;
    let suppressNextClick = false;

    function structuredCloneSafe(obj){ return JSON.parse(JSON.stringify(obj)); }

    function loadData(){
      for(const key of STORAGE_KEYS){
        try{
          const raw = localStorage.getItem(key);
          if(raw){
            const parsed = JSON.parse(raw);
            if(parsed && Array.isArray(parsed.folders)) return parsed;
          }
        }catch{}
      }
      return structuredCloneSafe(DEFAULT_DATA);
    }

    function saveData(){ localStorage.setItem(ACTIVE_STORAGE_KEY, JSON.stringify(state)); }

    function showView(name){
      currentView = name;
      Object.entries(views).forEach(([k,el]) => el.classList.toggle('active', k===name));
      fab.style.display = name === 'notes' ? 'grid' : 'none';
      closeOpenSwipe();
      closeMenu();
      if(name !== 'home') closeSheet();
    }

    function getFolderById(id){ return state.folders.find(f=>f.id===id) || null; }
    function getCurrentFolder(){ return currentFolderId===ALL_FOLDER_ID ? null : getFolderById(currentFolderId); }
    function getCurrentFolderName(){ return currentFolderId===ALL_FOLDER_ID ? 'All Memo' : (getCurrentFolder()?.name || 'Memo'); }
    function getAllNotes(){ return state.folders.flatMap(folder => folder.notes.map(note => ({ folder, note }))); }
    function getCurrentItems(){ return currentFolderId===ALL_FOLDER_ID ? getAllNotes() : (getCurrentFolder()?.notes || []).map(note=>({folder:getCurrentFolder(), note})); }

    function getDefaultWritableFolder(){
      return getFolderById(lastUsedFolderId)
        || state.folders.find(f => f.name.toLowerCase() === 'free')
        || state.folders[0]
        || null;
    }

    function findNoteRecord(noteId){
      for(const folder of state.folders){
        const note = folder.notes.find(n=>n.id===noteId);
        if(note) return { folder, note };
      }
      return null;
    }

    function escapeHtml(str=''){
      return str.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }

    function previewText(body=''){
      return (body || '').replace(/\n+/g, ' ').trim() || '追加テキストなし';
    }

    function formatDate(ts){
      const d = new Date(ts);
      const now = new Date();
      const startNow = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const startTarget = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      const diff = Math.floor((startNow - startTarget) / 86400000);
      if(diff === 0) return d.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
      if(diff === 1) return '昨日';
      const weekdays = ['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];
      if(diff <= 7) return weekdays[d.getDay()];
      return `${d.getMonth()+1}/${d.getDate()}`;
    }

    function dayBucket(ts){
      const now = new Date();
      const target = new Date(ts);
      const startNow = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const startTarget = new Date(target.getFullYear(), target.getMonth(), target.getDate());
      const diffDays = Math.floor((startNow - startTarget) / 86400000);
      if(diffDays === 0) return 'Today';
      if(diffDays === 1) return 'Yesterday';
      if(diffDays <= 7) return 'Last 7 Days';
      return 'Older';
    }

    function closeOpenSwipe(){
      if(openSwipeRow){ openSwipeRow.classList.remove('open'); openSwipeRow = null; }
    }


    function loadJson(key, fallback){
      try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }catch{ return fallback; }
    }
    function saveJson(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
    function formatHomeDate(){
      const d = new Date();
      const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      return `${yyyy}.${mm}.${dd} ${days[d.getDay()]}`;
    }
    function getTodayKey(){
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function getMoodMap(){ return loadJson(moodKey, {}); }
    function moodForDay(day){ return getMoodMap()[day] || ''; }
    function formatDiaryDay(day){ return (day || '').replaceAll('-', '.'); }
    function normalizeDiaryList(){
      const diaries = loadJson(diaryKey, []);
      let changed = false;
      const byDay = new Map();
      diaries.forEach(entry => {
        if(!entry || typeof entry !== 'object') { changed = true; return; }
        const next = { ...entry };
        if(!next.id){ next.id = uid(); changed = true; }
        if(typeof next.text !== 'string'){ next.text = ''; changed = true; }
        if(typeof next.mood !== 'string'){ next.mood = ''; changed = true; }
        if(typeof next.image !== 'string'){ next.image = ''; changed = true; }
        if(typeof next.imageName !== 'string'){ next.imageName = ''; changed = true; }
        if(!next.day){ next.day = getTodayKey(); changed = true; }
        if(!next.ts){ next.ts = Date.now(); changed = true; }
        const saved = byDay.get(next.day);
        if(!saved || (next.ts || 0) > (saved.ts || 0)){
          if(saved) changed = true;
          byDay.set(next.day, next);
        } else {
          changed = true;
        }
      });
      const normalized = Array.from(byDay.values()).sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0, 180);
      if(changed){ try{ saveJson(diaryKey, normalized); }catch{} }
      return normalized;
    }
    function getDiaryList(){ return normalizeDiaryList(); }
    function persistDiaryList(list){
      try{ saveJson(diaryKey, list.slice(0,180)); return true; }
      catch(err){ alert('画像つき日記の保存容量がいっぱいかも。
古い画像つき日記を減らすか、バックアップ後に整理してみてね。'); return false; }
    }
    function getHealthData(){ return loadJson(healthKey, {weight:'', calories:''}); }
    function currentMood(){ return getMoodMap()[getTodayKey()] || ''; }
    function currentDiaryHeading(entry){
      const day = entry?.day || getTodayKey();
      const mood = entry?.mood || moodForDay(day) || '—';
      return { day: formatDiaryDay(day), mood };
    }
    function diaryPreviewText(entry){
      const text = (entry?.text || '').trim();
      if(text) return text;
      if(entry?.image) return 'Photo only';
      return 'Mood only';
    }
    function renderHome(){
      if(dateText) dateText.textContent = formatHomeDate();
      const welcomes = [
        'おかえり。<br>今日はどこから触れる？',
        'おかえり。<br>まずはここで、ひと息。',
        'おかえり。<br>今日もちゃんと、ここが祐紀の家。'
      ];
      const dayIndex = new Date().getDate() % welcomes.length;
      if(welcomeText) welcomeText.innerHTML = welcomes[dayIndex];
      const mood = currentMood();
      if(moodStatusText) moodStatusText.textContent = mood ? `今日の気分: ${mood}` : '未記録';
      document.querySelectorAll('.pill[data-mood]').forEach(btn => btn.classList.toggle('active', btn.dataset.mood === mood));
      if(diaryBadge) diaryBadge.textContent = `Mood: ${mood || '—'}`;
      const health = getHealthData();
      if(healthSummary) healthSummary.textContent = `${health.weight || 'Weight'} / ${health.calories || 'Calories'}`;
    }
    function saveMood(symbol){
      const data = getMoodMap();
      data[getTodayKey()] = symbol;
      saveJson(moodKey, data);
      renderHome();
    }
    function openMoodHistory(){
      const data = getMoodMap();
      const rows = Object.entries(data).sort((a,b)=>a[0] < b[0] ? 1 : -1).slice(0,30)
        .map(([day,val]) => `${day}  ${val}`).join('
') || 'まだ記録がないよ。';
      openSimpleSheet('Mood History', rows.replaceAll('-', '.'));
    }
    function readFileAsDataUrl(file){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(new Error('file-read-failed'));
        reader.readAsDataURL(file);
      });
    }
    function loadImageElement(src){
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('image-load-failed'));
        img.src = src;
      });
    }
    async function compressDiaryImage(file){
      const rawUrl = await readFileAsDataUrl(file);
      const img = await loadImageElement(rawUrl);
      const maxSide = 960;
      let { width, height } = img;
      if(width > height && width > maxSide){ height = Math.max(1, Math.round(height * (maxSide / width))); width = maxSide; }
      else if(height >= width && height > maxSide){ width = Math.max(1, Math.round(width * (maxSide / height))); height = maxSide; }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#111'; ctx.fillRect(0, 0, width, height); ctx.drawImage(img, 0, 0, width, height);
      return canvas.toDataURL('image/jpeg', 0.72);
    }
    function syncDiaryDraftFromInputs(){
      if(!currentDiaryDraft) return;
      const input = document.getElementById('diaryInput');
      if(input) currentDiaryDraft.text = input.value || '';
    }
    function diaryMoodButtons(selected){
      return ['◎','○','△','×'].map(symbol => `
        <button class="pill${selected === symbol ? ' active' : ''}" type="button" onclick="setDiaryDraftMood('${symbol}')">${symbol}</button>
      `).join('');
    }
    function renderDiarySheet(){
      if(!currentDiaryDraft) return;
      const draft = currentDiaryDraft;
      const heading = currentDiaryHeading(draft);
      const hasImage = !!draft.image;
      const hasExistingEntry = getDiaryList().some(entry => entry.id === draft.id);
      const photoBlock = hasImage ? `
        <div class="diary-photo-inline">
          <button class="diary-photo-thumb" type="button" onclick="openDiaryDraftImagePreview()" aria-label="画像を大きく見る">
            <img src="${draft.image}" alt="Diary image">
          </button>
          <div class="diary-photo-actions">
            <button class="sub-button secondary" type="button" onclick="pickDiaryImage()">画像を差し替え</button>
            <button class="sub-button secondary" type="button" onclick="removeDiaryImage()">画像を削除</button>
          </div>
        </div>` : `
        <div class="diary-photo-inline empty">
          <button class="sub-button secondary" type="button" onclick="pickDiaryImage()">画像を追加</button>
        </div>`;
      simpleSheetContent.innerHTML = `
        <h3>Diary</h3>
        <div class="diary-sheet-meta">${heading.day}　<strong>${heading.mood}</strong></div>
        <div class="diary-mood-picker">${diaryMoodButtons(draft.mood || '')}</div>
        <textarea id="diaryInput" class="diary-textarea" rows="8" placeholder="気が向いた日に、ひとことでも。">${escapeHtml(draft.text || '')}</textarea>
        ${photoBlock}
        <div class="row">
          <button class="sub-button" type="button" onclick="closeSheet()">閉じる</button>
          ${hasExistingEntry ? '<button class="sub-button danger" type="button" onclick="deleteCurrentDiaryEntry()">削除</button>' : ''}
          <button class="sub-button" type="button" onclick="saveDiary()">保存</button>
        </div>`;
      simpleSheetBackdrop.classList.add('show');
      const input = document.getElementById('diaryInput');
      setTimeout(() => input?.focus(), 0);
    }
    function openDiarySheet(entryId = null){
      const diaries = getDiaryList();
      const existing = entryId ? diaries.find(entry => entry.id === entryId) : (diaries.find(entry => entry.day === getTodayKey()) || null);
      currentDiaryId = existing?.id || null;
      currentDiaryDraft = { id: existing?.id || uid(), day: existing?.day || getTodayKey(), mood: existing?.mood || moodForDay(existing?.day || getTodayKey()) || '', text: existing?.text || '', image: existing?.image || '', imageName: existing?.imageName || '', ts: existing?.ts || Date.now() };
      renderDiarySheet();
    }
    function setDiaryDraftMood(symbol){ syncDiaryDraftFromInputs(); if(!currentDiaryDraft) return; currentDiaryDraft.mood = symbol; renderDiarySheet(); }
    function pickDiaryImage(){ if(!diaryImageInput) return; diaryImageInput.value = ''; diaryImageInput.click(); }
    async function handleDiaryImageSelection(event){
      const file = event.target.files?.[0]; if(!file) return;
      if(!currentDiaryDraft) openDiarySheet();
      syncDiaryDraftFromInputs();
      try{ currentDiaryDraft.image = await compressDiaryImage(file); currentDiaryDraft.imageName = file.name || 'diary.jpg'; renderDiarySheet(); }
      catch(err){ alert('画像の読み込みに失敗したよ。別の画像でもう一回試してみてね。'); }
    }
    function removeDiaryImage(){ syncDiaryDraftFromInputs(); if(!currentDiaryDraft) return; currentDiaryDraft.image = ''; currentDiaryDraft.imageName = ''; renderDiarySheet(); }
    function openDiaryDraftImagePreview(){ if(!currentDiaryDraft?.image || !diaryLightbox || !diaryLightboxImage) return; diaryLightboxImage.src = currentDiaryDraft.image; diaryLightbox.classList.add('show'); }
    function closeDiaryImageLightbox(event){ if(event && event.target !== diaryLightbox) return; if(!diaryLightbox || !diaryLightboxImage) return; diaryLightbox.classList.remove('show'); diaryLightboxImage.src = ''; }
    function deleteCurrentDiaryEntry(){
      if(!currentDiaryDraft) return;
      const label = formatDiaryDay(currentDiaryDraft.day);
      if(!confirm(`${label} の日記を削除する？`)) return;
      const diaries = getDiaryList().filter(entry => entry.id !== currentDiaryDraft.id && entry.day !== currentDiaryDraft.day);
      if(!persistDiaryList(diaries)) return;
      currentDiaryDraft = null; currentDiaryId = null; renderHome(); closeSheet();
    }
    function saveDiary(){
      syncDiaryDraftFromInputs(); if(!currentDiaryDraft) return;
      const draft = currentDiaryDraft; const text = (draft.text || '').trim(); const mood = draft.mood || ''; const image = draft.image || '';
      if(!text && !mood && !image){ closeSheet(); return; }
      const diaries = getDiaryList().filter(entry => entry.id !== draft.id && entry.day !== draft.day);
      const entry = { id: draft.id || uid(), day: draft.day || getTodayKey(), mood, text, image, imageName: draft.imageName || '', ts: draft.ts || Date.now() };
      diaries.unshift(entry); diaries.sort((a,b)=>(b.ts||0)-(a.ts||0)); if(!persistDiaryList(diaries)) return;
      const moods = getMoodMap(); if(mood){ moods[entry.day] = mood; } else if(moods[entry.day] && entry.day === getTodayKey()){ delete moods[entry.day]; }
      saveJson(moodKey, moods); currentDiaryId = entry.id; currentDiaryDraft = { ...entry }; renderHome(); closeSheet();
    }
    function openDiaryEntry(entryId){ openDiarySheet(entryId); }
    function diaryItemHtml(entry){
      const mood = entry.mood || '—'; const text = (entry.text || '').trim(); const preview = text || (entry.image ? 'Photo only' : 'Mood only');
      return `<button class="diary-item${text ? '' : ' compact'}" type="button" onclick="openDiaryEntry('${entry.id}')">
        <div class="diary-item-head">
          <span class="diary-item-date">${formatDiaryDay(entry.day)}</span>
          <span class="diary-item-mood">${escapeHtml(mood)}</span>
        </div>
        <div class="diary-item-body">
          <div class="diary-item-text">
            <div class="diary-item-preview">${escapeHtml(preview)}</div>
          </div>
          ${entry.image ? `<div class="diary-item-thumb"><img src="${entry.image}" alt="Diary thumbnail"></div>` : ''}
        </div>
      </button>`;
    }
    function openDiaryList(){
      const diaries = getDiaryList().sort((a,b)=>(b.ts||0)-(a.ts||0));
      const body = diaries.length ? `
        <div class="diary-list">
          ${diaries.map(diaryItemHtml).join('')}
        </div>` : '<div class="diary-empty">まだ日記がないよ。</div>';
      simpleSheetContent.innerHTML = `
        <div class="sheet-title-row">
          <h3>Diary List</h3>
          <button class="icon-btn small" type="button" onclick="openDiaryListMenu()">…</button>
        </div>
        ${body}
        <div class="row">
          <button class="sub-button" type="button" onclick="closeSheet()">閉じる</button>
        </div>`;
      simpleSheetBackdrop.classList.add('show');
    }
    function triggerDiaryRestore(){ if(!diaryRestoreInput) return; diaryRestoreInput.value = ''; diaryRestoreInput.click(); }
    function openDiaryListMenu(){
      menuCard.innerHTML = `
        <button class="menu-item" id="menuDiaryBackup">バックアップ</button>
        <button class="menu-item" id="menuDiaryRestore">復元</button>`;
      document.getElementById('menuDiaryBackup').addEventListener('click', () => { closeMenu(); exportDiaryBackup(); });
      document.getElementById('menuDiaryRestore').addEventListener('click', () => { closeMenu(); triggerDiaryRestore(); });
      menuWrap.classList.add('show');
    }
    async function exportDiaryBackup(){
      const backup = { type: 'yuki-home-diary-backup', version: 1, exportedAt: new Date().toISOString(), data: { diaries: getDiaryList(), moods: getMoodMap(), health: getHealthData() } };
      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob); const a = document.createElement('a'); const stamp = new Date().toISOString().slice(0,19).replace(/[T:]/g,'-');
      a.href = url; a.download = `yuki-home-backup-${stamp}.json`; document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
    function restoreDiaryBackupFromFile(file){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          try{ const parsed = JSON.parse(String(reader.result || '{}')); if(parsed?.type !== 'yuki-home-diary-backup') throw new Error('invalid-backup'); const data = parsed.data || {}; if(Array.isArray(data.diaries)) saveJson(diaryKey, data.diaries); if(data.moods && typeof data.moods === 'object') saveJson(moodKey, data.moods); if(data.health && typeof data.health === 'object') saveJson(healthKey, data.health); resolve(); }catch(err){ reject(err); }
        };
        reader.onerror = () => reject(new Error('restore-read-failed')); reader.readAsText(file);
      });
    }
    async function handleDiaryRestoreSelection(event){
      const file = event.target.files?.[0]; if(!file) return;
      try{ await restoreDiaryBackupFromFile(file); renderHome(); closeSheet(); alert('Diary / Mood / Health を復元したよ。'); }
      catch(err){ alert('復元に失敗したよ。バックアップファイルを確認してもう一回試してみてね。'); }
      finally { if(diaryRestoreInput) diaryRestoreInput.value = ''; }
    }
    function openHealthSheet(){
      const health = getHealthData();
      simpleSheetContent.innerHTML = `
        <h3>Health</h3>
        <p>見せすぎない記録。必要な時だけ開く。</p>
        <input id="weightInput" placeholder="Weight" value="${escapeHtml(health.weight || '')}">
        <input id="calInput" placeholder="Calories" value="${escapeHtml(health.calories || '')}">
        <div class="row">
          <button class="sub-button" type="button" onclick="closeSheet()">閉じる</button>
          <button class="sub-button" type="button" onclick="saveHealth()">保存</button>
        </div>`;
      simpleSheetBackdrop.classList.add('show');
    }
    function saveHealth(){
      const weight = document.getElementById('weightInput')?.value?.trim() || '';
      const calories = document.getElementById('calInput')?.value?.trim() || '';
      saveJson(healthKey, {weight, calories});
      renderHome();
      closeSheet();
    }
    function openSimpleSheet(title, text){
      simpleSheetContent.innerHTML = `<h3>${escapeHtml(title)}</h3><p>${escapeHtml(text)}</p><div class="row"><button class="sub-button" type="button" onclick="closeSheet()">閉じる</button></div>`;
      simpleSheetBackdrop.classList.add('show');
    }
    function closeSheet(event){
      if(event && event.target !== simpleSheetBackdrop) return;
      simpleSheetBackdrop.classList.remove('show');
    }

    function renderFolders(){
      const totalNotes = state.folders.reduce((sum, f) => sum + f.notes.length, 0);
      folderListEl.innerHTML = [
        folderRowHtml({ id:ALL_FOLDER_ID, name:'All Memo', count:totalNotes, all:true }),
        ...state.folders.map(folder => folderRowHtml({ id:folder.id, name:folder.name, count:folder.notes.length, all:false }))
      ].join('');

      folderListEl.querySelectorAll('.folder-row').forEach(row => {
        const id = row.dataset.folderId;
        const all = id === ALL_FOLDER_ID;
        if(folderEditMode && !all){ row.classList.add('editing'); }
        row.addEventListener('click', () => {
          if(folderEditMode && !all) return;
          currentFolderId = id;
          if(id !== ALL_FOLDER_ID) lastUsedFolderId = id;
          renderNotes();
          showView('notes');
        });
      });

      setupFolderReorder();
    }

    function folderRowHtml({id,name,count,all}){
      return `
        <button class="folder-row" type="button" data-folder-id="${id}">
          <div class="folder-main">
            <div class="folder-icon">📁</div>
            <div class="folder-name">${escapeHtml(name)}</div>
          </div>
          <div class="folder-count">${count}</div>
          <div class="folder-chevron">›</div>
          ${!all ? `
            <div class="folder-edit-actions">
              <div class="dots-icon">◌◌◌</div>
              <div class="drag-handle"><span></span></div>
            </div>` : ''}
        </button>`;
    }


    function setupFolderReorder(){
      if(!folderEditMode) return;
      const rows = Array.from(folderListEl.querySelectorAll('.folder-row')).filter(row => row.dataset.folderId !== ALL_FOLDER_ID);
      rows.forEach(row => {
        const handle = row.querySelector('.drag-handle');
        if(!handle) return;
        handle.addEventListener('pointerdown', startFolderDrag);
      });
    }

    function startFolderDrag(e){
      if(!folderEditMode) return;
      e.preventDefault();
      e.stopPropagation();
      const handle = e.currentTarget;
      const row = handle.closest('.folder-row');
      if(!row) return;
      const rowId = row.dataset.folderId;
      const containerRect = folderListEl.getBoundingClientRect();
      const rowRect = row.getBoundingClientRect();
      const startY = e.clientY;
      let currentY = startY;
      let moved = false;
      let currentIndex = state.folders.findIndex(f => f.id === rowId);
      if(currentIndex < 0) return;

      row.classList.add('dragging');
      row.style.position = 'relative';
      row.style.zIndex = '5';
      row.style.touchAction = 'none';
      document.body.style.userSelect = 'none';
      document.body.style.webkitUserSelect = 'none';

      const onMove = (ev) => {
        currentY = ev.clientY;
        const delta = currentY - startY;
        if(Math.abs(delta) > 2) moved = true;
        row.style.transform = `translateY(${delta}px)`;

        const liveRows = Array.from(folderListEl.querySelectorAll('.folder-row')).filter(r => r.dataset.folderId !== ALL_FOLDER_ID && r !== row);
        liveRows.forEach(r => r.classList.remove('drop-target'));
        const target = liveRows.find(r => {
          const rect = r.getBoundingClientRect();
          return currentY > rect.top && currentY < rect.bottom;
        });
        if(!target) return;
        target.classList.add('drop-target');
        const targetId = target.dataset.folderId;
        const targetIndex = state.folders.findIndex(f => f.id === targetId);
        if(targetIndex < 0 || targetIndex === currentIndex) return;
        const targetRect = target.getBoundingClientRect();
        const shouldPlaceAfter = currentY > targetRect.top + targetRect.height / 2;
        let newIndex = targetIndex + (shouldPlaceAfter ? 1 : 0);
        if(newIndex > currentIndex) newIndex -= 1;
        if(newIndex === currentIndex) return;
        const [movedFolder] = state.folders.splice(currentIndex, 1);
        state.folders.splice(newIndex, 0, movedFolder);
        currentIndex = newIndex;
        saveData();
        renderFolders();
        const freshRow = folderListEl.querySelector(`.folder-row[data-folder-id="${rowId}"]`);
        if(freshRow){
          freshRow.classList.add('editing','dragging');
          freshRow.style.position = 'relative';
          freshRow.style.zIndex = '5';
          freshRow.style.touchAction = 'none';
          freshRow.style.transform = `translateY(${currentY - startY}px)`;
          row.replaceWith(freshRow);
          freshRow.querySelector('.drag-handle')?.removeEventListener('pointerdown', startFolderDrag);
        }
      };

      const onEnd = () => {
        const activeRow = folderListEl.querySelector(`.folder-row[data-folder-id="${rowId}"]`) || row;
        folderListEl.querySelectorAll('.folder-row').forEach(r => r.classList.remove('drop-target'));
        activeRow.classList.remove('dragging');
        activeRow.style.transform = '';
        activeRow.style.position = '';
        activeRow.style.zIndex = '';
        activeRow.style.touchAction = '';
        document.body.style.userSelect = '';
        document.body.style.webkitUserSelect = '';
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', onEnd);
        window.removeEventListener('pointercancel', onEnd);
        if(moved){
          renderFolders();
        }
      };

      window.addEventListener('pointermove', onMove, {passive:true});
      window.addEventListener('pointerup', onEnd, {passive:true});
      window.addEventListener('pointercancel', onEnd, {passive:true});
    }

    function renderNotes(){
      const items = getCurrentItems().sort((a,b)=>b.note.updatedAt - a.note.updatedAt);
      const title = getCurrentFolderName();
      notesNavTitle.textContent = title;
      notesNavSub.textContent = `${items.length}件のメモ`;
      notesScreenTitle.textContent = title;
      notesScreenSubtitle.textContent = `${items.length}件のメモ`;

      if(items.length === 0){
        noteSectionsEl.innerHTML = '<div class="list-card"><div class="empty">まだメモがないよ。右下の✎から最初の1枚を書いてみよう。</div></div>';
        return;
      }

      const groups = { Today:[], Yesterday:[], 'Last 7 Days':[], Older:[] };
      items.forEach(item => groups[dayBucket(item.note.updatedAt)].push(item));
      const labels = { Today:'TODAY', Yesterday:'YESTERDAY', 'Last 7 Days':'LAST 7 DAYS', Older:'OLDER' };
      noteSectionsEl.innerHTML = Object.entries(groups).filter(([,arr])=>arr.length).map(([bucket, arr]) => `
        <section class="note-section">
          <div class="section-title">${labels[bucket]}</div>
          <div class="list-card note-group">
            ${arr.map(({folder,note}) => noteRowHtml(folder, note)).join('')}
          </div>
        </section>
      `).join('');

      noteSectionsEl.querySelectorAll('.swipe-row').forEach(row => {
        const noteId = row.dataset.noteId;
        setupSwipeRow(row);
        row.querySelector('.note-front').addEventListener('click', () => {
          if(suppressNextClick){ suppressNextClick = false; return; }
          if(row.classList.contains('open')) { closeOpenSwipe(); return; }
          openEditor(noteId);
        });
        row.querySelector('.swipe-action.move').addEventListener('click', (e) => { e.stopPropagation(); openMoveOverlay(noteId); });
        row.querySelector('.swipe-action.delete').addEventListener('click', (e) => { e.stopPropagation(); deleteNote(noteId); });
      });
    }

    function noteRowHtml(folder, note){
      const showFolder = currentFolderId === ALL_FOLDER_ID;
      return `
        <div class="swipe-row" data-note-id="${note.id}">
          <div class="swipe-actions">
            <button class="swipe-action move" type="button"><span class="icon">📁</span><span>移動</span></button>
            <button class="swipe-action delete" type="button"><span class="icon">🗑</span><span>削除</span></button>
          </div>
          <button class="note-front" type="button">
            <div class="note-title">${escapeHtml(note.title || 'Untitled')}</div>
            <div class="note-preview">${escapeHtml(previewText(note.body))}</div>
            <div class="note-subline">
              <span>${escapeHtml(formatDate(note.updatedAt))}</span>
              ${showFolder ? `<span class="note-folder-chip"><span class="tiny-folder">📁</span>${escapeHtml(folder.name)}</span>` : ''}
            </div>
          </button>
        </div>`;
    }

    function setupSwipeRow(row){
      let startX = 0;
      let deltaX = 0;
      let touching = false;
      const front = row.querySelector('.note-front');
      const maxLeft = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--action-w')) * 2;

      row.addEventListener('touchstart', (e) => {
        if(e.touches.length !== 1) return;
        touching = true;
        startX = e.touches[0].clientX;
        deltaX = 0;
        if(openSwipeRow && openSwipeRow !== row) closeOpenSwipe();
      }, {passive:true});

      row.addEventListener('touchmove', (e) => {
        if(!touching) return;
        deltaX = e.touches[0].clientX - startX;
        if(deltaX > 0) deltaX = 0;
        const limited = Math.max(deltaX, -maxLeft);
        front.style.transform = `translateX(${limited}px)`;
      }, {passive:true});

      row.addEventListener('touchend', () => {
        if(!touching) return;
        touching = false;
        suppressNextClick = Math.abs(deltaX) > 12;
        front.style.transform = '';
        if(deltaX < -46){
          row.classList.add('open');
          openSwipeRow = row;
        } else {
          row.classList.remove('open');
          if(openSwipeRow === row) openSwipeRow = null;
        }
        deltaX = 0;
      });
    }

    function startNewFolder(){
      const name = prompt('フォルダ名を入力してね', 'New Folder');
      if(!name || !name.trim()) return;
      state.folders.push({ id:uid(), name:name.trim(), notes:[] });
      saveData();
      renderFolders();
    }

    function startNewNote(){
      const folder = currentView === 'notes' && currentFolderId !== ALL_FOLDER_ID ? getCurrentFolder() : getDefaultWritableFolder();
      if(!folder) return;
      currentFolderId = folder.id;
      lastUsedFolderId = folder.id;
      const note = { id:uid(), title:'', body:'', updatedAt:Date.now() };
      folder.notes.unshift(note);
      saveData();
      renderFolders();
      renderNotes();
      openEditor(note.id, true);
    }

    function openEditor(noteId, isNew=false){
      const rec = findNoteRecord(noteId);
      if(!rec) return;
      currentNoteId = noteId;
      currentFolderId = rec.folder.id;
      lastUsedFolderId = rec.folder.id;
      editorNavTitle.textContent = rec.folder.name;
      editorNavSub.textContent = isNew ? '新規メモ' : '編集';
      editorFolderTag.textContent = rec.folder.name;
      editorDateTag.textContent = isNew ? 'new note' : formatDate(rec.note.updatedAt);
      editorTitle.value = rec.note.title || '';
      editorBody.value = rec.note.body || '';
      lastSnapshot = JSON.stringify({title:editorTitle.value, body:editorBody.value});
      draftChanged = false;
      showView('editor');
      setTimeout(() => editorTitle.focus(), 50);
    }

    function saveCurrentEditorNote(){
      const rec = findNoteRecord(currentNoteId);
      if(!rec) return;
      rec.note.title = editorTitle.value.trim();
      rec.note.body = editorBody.value;
      rec.note.updatedAt = Date.now();
      saveData();
      draftChanged = false;
      editorDateTag.textContent = formatDate(rec.note.updatedAt);
      renderFolders();
      renderNotes();
    }

    async function exportCurrentNote(){
      const title = (editorTitle.value.trim() || 'memo').replace(/[\\/:*?"<>|]/g,'_');
      const text = `${editorTitle.value.trim() || 'Untitled'}\n\n${editorBody.value || ''}`;
      const file = new File([text], `${title}.txt`, { type:'text/plain' });
      try{
        if(navigator.share && navigator.canShare && navigator.canShare({ files:[file] })){
          await navigator.share({ files:[file], title, text:'Memoを書き出し' });
          return;
        }
      }catch(err){ if(err && err.name === 'AbortError') return; }
      const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `${title}.txt`; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 600);
    }

    function deleteNote(noteId){
      const rec = findNoteRecord(noteId);
      if(!rec) return;
      if(!confirm(`「${rec.note.title || 'Untitled'}」を削除する？`)) return;
      rec.folder.notes = rec.folder.notes.filter(n => n.id !== noteId);
      saveData();
      renderFolders();
      renderNotes();
    }

    function deleteCurrentNote(){
      const rec = findNoteRecord(currentNoteId);
      if(!rec) return;
      closeMenu();
      if(!confirm(`「${rec.note.title || 'Untitled'}」を削除する？`)) return;
      if(!confirm('本当に削除する？\nこの操作は元に戻せないよ。')) return;
      rec.folder.notes = rec.folder.notes.filter(n => n.id !== currentNoteId);
      saveData();
      renderFolders();
      renderNotes();
      showView('notes');
    }

    function openMoveOverlay(noteId){
      closeOpenSwipe();
      moveTargetNoteId = noteId;
      const rec = findNoteRecord(noteId);
      if(!rec) return;
      moveFolderList.innerHTML = state.folders.map(folder => `
        <button class="picker-item" type="button" data-folder-id="${folder.id}" ${folder.id===rec.folder.id ? 'disabled' : ''}>
          <div class="folder-icon">📁</div>
          <div style="min-width:0;flex:1;">
            <div class="folder-name">${escapeHtml(folder.name)}</div>
            <div class="folder-count">${folder.notes.length} notes</div>
          </div>
        </button>`).join('');
      moveFolderList.querySelectorAll('.picker-item').forEach(btn => btn.addEventListener('click', () => {
        if(btn.disabled) return;
        moveNoteToFolder(noteId, btn.dataset.folderId);
      }));
      moveOverlay.classList.add('show');
    }

    function moveNoteToFolder(noteId, folderId){
      const rec = findNoteRecord(noteId);
      const target = getFolderById(folderId);
      if(!rec || !target || rec.folder.id===folderId) return;
      rec.folder.notes = rec.folder.notes.filter(n => n.id !== noteId);
      rec.note.updatedAt = Date.now();
      target.notes.unshift(rec.note);
      lastUsedFolderId = target.id;
      saveData();
      moveOverlay.classList.remove('show');
      renderFolders();
      renderNotes();
    }

    function closeMenu(){ menuWrap.classList.remove('show'); }

    function openNotesMenu(){
      menuCard.innerHTML = `
        <button class="menu-item" id="menuNewNote">新規メモ</button>
        <button class="menu-item" id="menuNewFolder">新規フォルダ</button>`;
      document.getElementById('menuNewNote').addEventListener('click', () => { closeMenu(); startNewNote(); });
      document.getElementById('menuNewFolder').addEventListener('click', () => { closeMenu(); startNewFolder(); });
      menuWrap.classList.add('show');
    }

    function openEditorMenu(){
      menuCard.innerHTML = `
        <button class="menu-item" id="menuExport">ファイルに保存 / 共有</button>
        <button class="menu-item delete" id="menuDelete">削除</button>`;
      document.getElementById('menuExport').addEventListener('click', async () => { closeMenu(); saveCurrentEditorNote(); await exportCurrentNote(); });
      document.getElementById('menuDelete').addEventListener('click', deleteCurrentNote);
      menuWrap.classList.add('show');
    }

    document.getElementById('openMemoFromHome').addEventListener('click', () => { renderFolders(); showView('folders'); });
    const diaryCard = document.getElementById('openDiaryWrite');
    if (diaryCard) {
      diaryCard.addEventListener('click', (e) => { if(!e.target.closest('.sub-button')) openDiarySheet(); });
      diaryCard.addEventListener('keydown', (e) => { if((e.key === 'Enter' || e.key === ' ') && !e.target.closest('.sub-button')) { e.preventDefault(); openDiarySheet(); } });
    }
    document.getElementById('openLivingFromHome').addEventListener('click', () => openSimpleSheet('Living','みんながいる共有のリビング。\nここは次の制作でつないでいく場所。'));
    document.getElementById('openRoomsFromHome').addEventListener('click', () => openSimpleSheet('Rooms','それぞれの部屋へ入る入口。\nRoomsはあとで本設計する予定。'));
    document.getElementById('openTreasuresFromHome').addEventListener('click', () => openSimpleSheet('Treasures','宝物や思い出の保管場所。\nここも次の制作で育てていく。'));
    document.getElementById('backHomeFromFolders').addEventListener('click', () => showView('home'));
    document.getElementById('toggleFolderEdit').addEventListener('click', (e) => {
      folderEditMode = !folderEditMode;
      e.currentTarget.textContent = folderEditMode ? '完了' : '編集';
      renderFolders();
    });
    document.getElementById('addFolderTop').addEventListener('click', startNewFolder);
    document.getElementById('backToFolders').addEventListener('click', () => showView('folders'));
    document.getElementById('notesMoreBtn').addEventListener('click', openNotesMenu);
    document.getElementById('backToNotes').addEventListener('click', () => { if(draftChanged) saveCurrentEditorNote(); showView('notes'); });
    document.getElementById('editorMoreBtn').addEventListener('click', openEditorMenu);
    document.getElementById('doneBtn').addEventListener('click', () => { saveCurrentEditorNote(); showView('notes'); });
    document.getElementById('closeMoveOverlay').addEventListener('click', () => moveOverlay.classList.remove('show'));
    moveOverlay.addEventListener('click', (e) => { if(e.target === moveOverlay) moveOverlay.classList.remove('show'); });
    document.getElementById('closeMenuBackdrop').addEventListener('click', closeMenu);
    if(diaryImageInput) diaryImageInput.addEventListener('change', handleDiaryImageSelection);
    if(diaryRestoreInput) diaryRestoreInput.addEventListener('change', handleDiaryRestoreSelection);
    fab.addEventListener('click', startNewNote);

    editorTitle.addEventListener('input', () => { draftChanged = true; });
    editorBody.addEventListener('input', () => { draftChanged = true; });
    document.addEventListener('click', (e) => { if(openSwipeRow && !e.target.closest('.swipe-row')) closeOpenSwipe(); });

    renderHome();
    renderFolders();
    renderNotes();
    showView('home');
  </script>
