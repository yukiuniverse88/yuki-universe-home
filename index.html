<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060405" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>祐紀ユニバース｜帰る家</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <section id="view-home" class="view active home-view">
      <main class="home-wrap">
        <header class="brand">
          <div class="brand-title">Y U K I&nbsp;&nbsp;U N I V E R S E</div>
        </header>

        <section class="hero">
          <div class="date" id="dateText"></div>
          <h1 class="welcome" id="welcomeText">おかえり。<br>今日はどこから触れる？</h1>
        </section>

        <div class="home-title">Now, touch</div>
        <section class="main-grid">
          <button class="card feature-card memo-card" type="button" id="openMemoFromHome">
            <div class="icon">✎</div>
            <h2 class="label">Memo</h2>
          </button>

          <button class="card feature-card living-card" type="button" id="openLivingFromHome">
            <div class="icon">⌂</div>
            <h2 class="label">Living</h2>
          </button>

          <button class="card feature-card rooms-card" type="button" id="openRoomsFromHome">
            <div class="icon">☾</div>
            <h2 class="label">Rooms</h2>
          </button>

          <button class="card feature-card treasures-card" type="button" id="openTreasuresFromHome">
            <div class="icon">✦</div>
            <h2 class="label">Treasures</h2>
          </button>
        </section>

        <div class="home-title">Today</div>
        <section class="today-stack">
          <article class="card mood-card">
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <p class="small-title">TODAY'S MOOD</p>
              <button class="history-button" type="button" onclick="openMoodHistory()" style="height:36px;font-size:14px;padding:0 14px;min-width:auto;">History</button>
            </div>
            <div class="compact-status" id="moodStatusText">未記録</div>
            <div class="mood-line">
              <div class="mood-symbols">
                <button class="pill" type="button" data-mood="◎" onclick="selectMood('◎')">◎</button>
                <button class="pill" type="button" data-mood="○" onclick="selectMood('○')">○</button>
                <button class="pill" type="button" data-mood="△" onclick="selectMood('△')">△</button>
                <button class="pill" type="button" data-mood="×" onclick="selectMood('×')">×</button>
              </div>
              <button class="history-button" type="button" id="moodSaveBtn" onclick="confirmMood()" style="display:none;">Save</button>
            </div>
          </article>

          <div class="duo-grid">
            <button class="card duo-card" type="button" id="openDiaryFromHome">
              <div class="duo-badge diary-badge">✎</div>
              <div class="duo-info">
                <div class="duo-label">Diary</div>
                <div class="duo-sub" id="diaryBadge">Mood: —</div>
              </div>
              <span class="duo-arrow">›</span>
            </button>

            <button class="card duo-card" type="button" id="openHealthFromHome">
              <div class="duo-badge health-badge">♡</div>
              <div class="duo-info">
                <div class="duo-label">Health</div>
                <div class="duo-sub" id="healthSummary">Weight / Calories</div>
              </div>
              <span class="duo-arrow">›</span>
            </button>
          </div>
        </section>
        <div class="home-spacer"></div>
      </main>
    </section>
  </div>

  <div class="simple-sheet-backdrop" id="simpleSheetBackdrop" onclick="closeSheet(event)">
    <section class="simple-sheet" id="simpleSheetContent" onclick="event.stopPropagation()"></section>
  </div>

  <script>
    const moodKey = 'yuki_home_moods_v4';
    const diaryKey = 'yuki_home_diaries_v4';
    const healthKey = 'yuki_home_health_v4';
    const healthRecordsKey = 'yuki_home_health_records_v1';
    const healthSeedVersionKey = 'yuki_home_health_seed_version';
    const healthSeedVersion = '2026-03-24-seed-v1';
    const healthSeedRecords = [{"day":"2026-01-20","weight":"","calories":"1587"},{"day":"2026-01-21","weight":"92.0","calories":"1563"},{"day":"2026-01-22","weight":"","calories":"1701"},{"day":"2026-01-23","weight":"","calories":"1505"},{"day":"2026-01-24","weight":"","calories":"1646"},{"day":"2026-01-25","weight":"89.5","calories":"1700"},{"day":"2026-01-26","weight":"89.3","calories":"1794"},{"day":"2026-01-27","weight":"","calories":"1722"},{"day":"2026-01-28","weight":"89.6","calories":"1782"},{"day":"2026-01-29","weight":"","calories":"1618"},{"day":"2026-01-30","weight":"89.7","calories":"1506"},{"day":"2026-01-31","weight":"","calories":"1714"},{"day":"2026-02-01","weight":"89.1","calories":"1994"},{"day":"2026-02-02","weight":"88.8","calories":"1577"},{"day":"2026-02-03","weight":"89.1","calories":"1558"},{"day":"2026-02-04","weight":"88.8","calories":"1581"},{"day":"2026-02-05","weight":"89.3","calories":"1752"},{"day":"2026-02-06","weight":"","calories":"1521"},{"day":"2026-02-07","weight":"88.9","calories":"1803"},{"day":"2026-02-08","weight":"89.2","calories":"1283"},{"day":"2026-02-09","weight":"","calories":"2549"},{"day":"2026-02-10","weight":"","calories":"1570"},{"day":"2026-02-11","weight":"89.2","calories":"2092"},{"day":"2026-02-12","weight":"89.2","calories":"1589"},{"day":"2026-02-13","weight":"88.5","calories":"1486"},{"day":"2026-02-14","weight":"","calories":"1616"},{"day":"2026-02-15","weight":"88.3","calories":"1575"},{"day":"2026-02-16","weight":"88.8","calories":"1687"},{"day":"2026-02-17","weight":"88.8","calories":"2075"},{"day":"2026-02-18","weight":"89.1","calories":"1412"},{"day":"2026-02-19","weight":"","calories":"2388"},{"day":"2026-02-20","weight":"","calories":"1967"},{"day":"2026-02-21","weight":"","calories":"2138"},{"day":"2026-02-22","weight":"","calories":"2028"},{"day":"2026-02-23","weight":"","calories":"2700"},{"day":"2026-02-24","weight":"","calories":"2023"},{"day":"2026-02-25","weight":"89.6","calories":"1556"},{"day":"2026-02-26","weight":"","calories":"1552"},{"day":"2026-02-27","weight":"","calories":"2055"},{"day":"2026-02-28","weight":"89.0","calories":"1619"},{"day":"2026-03-01","weight":"88.8","calories":"1577"},{"day":"2026-03-02","weight":"88.9","calories":"1614"},{"day":"2026-03-03","weight":"88.2","calories":"1568"},{"day":"2026-03-04","weight":"","calories":"1763"},{"day":"2026-03-05","weight":"88.0","calories":"1528"},{"day":"2026-03-06","weight":"88.3","calories":"1969"},{"day":"2026-03-07","weight":"88.3","calories":"1729"},{"day":"2026-03-08","weight":"88.4","calories":"1972"},{"day":"2026-03-09","weight":"88.5","calories":"2362"},{"day":"2026-03-10","weight":"88.6","calories":"1641"},{"day":"2026-03-11","weight":"87.8","calories":"1665"},{"day":"2026-03-12","weight":"","calories":"1531"},{"day":"2026-03-13","weight":"87.6","calories":"1804"},{"day":"2026-03-14","weight":"87.8","calories":"2005"},{"day":"2026-03-15","weight":"","calories":"2076"},{"day":"2026-03-16","weight":"88.0","calories":"2233"},{"day":"2026-03-17","weight":"","calories":"1576"},{"day":"2026-03-18","weight":"88.2","calories":"1579"},{"day":"2026-03-19","weight":"88.0","calories":"2285"},{"day":"2026-03-20","weight":"","calories":"1416"},{"day":"2026-03-21","weight":"88.1","calories":"2616"},{"day":"2026-03-22","weight":"","calories":"1496"},{"day":"2026-03-23","weight":"87.9","calories":"1505"}];


    function loadJson(key, fallback){
      try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }catch{ return fallback; }
    }
    function saveJson(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
    function escapeHtml(str=''){
      return str.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }
    function getTodayKey(){
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function formatHomeDate(){
      const d = new Date();
      const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${days[d.getDay()]}`;
    }
    function getMoodMap(){ return loadJson(moodKey, {}); }
    function parseNumber(value){
      if(value == null) return null;
      const cleaned = String(value).replace(/,/g,'').replace(/[^\d.\-]/g,'').trim();
      if(!cleaned) return null;
      const num = Number(cleaned);
      return Number.isFinite(num) ? num : null;
    }
    function uid(){ return 'id-' + Math.random().toString(36).slice(2,11); }
    function mergeSeedRecords(existing, incoming){
      const map = new Map();
      (Array.isArray(existing) ? existing : []).forEach(record => {
        if(!record || !record.day) return;
        map.set(record.day, { ...record });
      });
      incoming.forEach(seed => {
        const current = map.get(seed.day);
        if(current){
          map.set(seed.day, {
            ...current,
            weight: String(current.weight || '').trim() || String(seed.weight || '').trim(),
            calories: String(current.calories || '').trim() || String(seed.calories || '').trim(),
            ts: current.ts || Date.now()
          });
        }else{
          map.set(seed.day, {
            id: uid(),
            day: seed.day,
            weight: String(seed.weight || '').trim(),
            calories: String(seed.calories || '').trim(),
            ts: Date.now()
          });
        }
      });
      return Array.from(map.values());
    }
    function ensureHealthSeedData(){
      if(localStorage.getItem(healthSeedVersionKey) === healthSeedVersion) return;
      const existing = loadJson(healthRecordsKey, []);
      const merged = mergeSeedRecords(existing, healthSeedRecords);
      saveJson(healthRecordsKey, merged.sort((a,b)=>(a.day < b.day ? 1 : -1)));
      const latest = [...merged].sort((a,b)=>(a.day < b.day ? 1 : -1)).find(entry => (entry.weight || '').trim() || (entry.calories || '').trim());
      if(latest){
        saveJson(healthKey, { weight: latest.weight || '', calories: latest.calories || '' });
      }
      localStorage.setItem(healthSeedVersionKey, healthSeedVersion);
    }
    function getHealthData(){
      ensureHealthSeedData();
      const records = loadJson(healthRecordsKey, []);
      if(Array.isArray(records) && records.length){
        const latest = [...records].sort((a,b)=>(a.day < b.day ? 1 : -1)).find(entry => (entry.weight || '').trim() || (entry.calories || '').trim());
        if(latest) return { weight: latest.weight || '', calories: latest.calories || '' };
      }
      return loadJson(healthKey, {weight:'', calories:''});
    }
    function currentMood(){ return getMoodMap()[getTodayKey()] || ''; }

    const dateText = document.getElementById('dateText');
    const welcomeText = document.getElementById('welcomeText');
    const moodStatusText = document.getElementById('moodStatusText');
    const diaryBadge = document.getElementById('diaryBadge');
    const healthSummary = document.getElementById('healthSummary');
    const simpleSheetBackdrop = document.getElementById('simpleSheetBackdrop');
    const simpleSheetContent = document.getElementById('simpleSheetContent');

    let pendingMood = null;

    function renderHome(){
      if(dateText) dateText.textContent = formatHomeDate();
      const welcomes = [
        'おかえり。<br>今日はどこから触れる？',
        'おかえり。<br>まずはここで、ひと息。',
        'おかえり。<br>今日もちゃんと、ここが祐紀の家。'
      ];
      const dayIndex = new Date().getDate() % welcomes.length;
      if(welcomeText) welcomeText.innerHTML = welcomes[dayIndex];
      const mood = currentMood();
      const display = pendingMood || mood;
      if(moodStatusText) moodStatusText.textContent = display ? `今日の気分: ${display}` : '未記録';
      document.querySelectorAll('.pill[data-mood]').forEach(btn => btn.classList.toggle('active', btn.dataset.mood === display));
      if(diaryBadge) diaryBadge.textContent = `Mood: ${mood || '—'}`;
      const health = getHealthData();
      const weightNum = parseNumber(health.weight);
      const caloriesNum = parseNumber(health.calories);
      const weightText = weightNum != null ? `${weightNum.toFixed(1)}kg` : 'Weight';
      const caloriesText = caloriesNum != null ? `${Math.round(caloriesNum).toLocaleString('ja-JP')}kcal` : 'Calories';
      if(healthSummary) healthSummary.textContent = `${weightText} / ${caloriesText}`;
      const saveBtn = document.getElementById('moodSaveBtn');
      if(saveBtn) saveBtn.style.display = pendingMood ? '' : 'none';
    }

    function selectMood(symbol){
      pendingMood = symbol;
      renderHome();
    }


    function confirmMood(){
      if(!pendingMood) return;
      const today = getTodayKey();
      // Save mood
      const data = getMoodMap();
      data[today] = pendingMood;
      saveJson(moodKey, data);
      // Sync to diary
      const diaries = loadJson(diaryKey, []);
      const existing = diaries.find(e => e.day === today);
      if(existing){
        existing.mood = pendingMood;
        existing.ts = Date.now();
      } else {
        diaries.unshift({ id:uid(), day:today, mood:pendingMood, text:'', image:'', imageName:'', ts:Date.now() });
      }
      diaries.sort((a,b)=>(b.ts||0)-(a.ts||0));
      saveJson(diaryKey, diaries.slice(0,180));
      pendingMood = null;
      renderHome();
    }

    function openMoodHistory(){
      const data = getMoodMap();
      const rows = Object.entries(data).sort((a,b)=>a[0] < b[0] ? 1 : -1).slice(0,30)
        .map(([day,val]) => `${day}  ${val}`).join('\n') || 'まだ記録がないよ。';
      openSimpleSheet('Mood History', rows.replaceAll('-', '.'));
    }

    function openSimpleSheet(title, text){
      simpleSheetContent.innerHTML = `<h3>${escapeHtml(title)}</h3><p>${escapeHtml(text)}</p><div class="row"><button class="sub-button" type="button" onclick="closeSheet()">閉じる</button></div>`;
      simpleSheetBackdrop.classList.add('show');
    }
    function closeSheet(event){
      if(event && event.target !== simpleSheetBackdrop) return;
      simpleSheetBackdrop.classList.remove('show');
    }

    document.getElementById('openMemoFromHome').addEventListener('click', () => { window.location.href = 'memo.html'; });
    document.getElementById('openDiaryFromHome').addEventListener('click', () => { window.location.href = 'diary.html'; });
    document.getElementById('openHealthFromHome').addEventListener('click', () => { window.location.href = 'health.html'; });
    document.getElementById('openLivingFromHome').addEventListener('click', () => openSimpleSheet('Living','みんながいる共有のリビング。\nここは次の制作でつないでいく場所。'));
    document.getElementById('openRoomsFromHome').addEventListener('click', () => openSimpleSheet('Rooms','それぞれの部屋へ入る入口。\nRoomsはあとで本設計する予定。'));
    document.getElementById('openTreasuresFromHome').addEventListener('click', () => openSimpleSheet('Treasures','宝物や思い出の保管場所。\nここも次の制作で育てていく。'));

    renderHome();
  </script>
</body>
</html>
